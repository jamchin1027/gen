    function parseCustom8b10bTable() {
      const overrideText = String($('custom8b10bTable')?.value || '').trim();
      const text = overrideText || USER_8B10B_TABLE_TEXT;
      if (state.custom8b10bCache.text === text && state.custom8b10bCache.map) return state.custom8b10bCache.map;
      const map = new Map();
      for (const line of text.split(/\r?\n/)) {
        const parts = line.trim().match(/[01]{10}|[0-9a-fA-F]{1,2}/g) || [];
        if (parts.length < 3) continue;
        const din = parseInt(parts[0], 16);
        if (!Number.isFinite(din) || din < 0 || din > 255) continue;
        const codes = parts.filter(p => /^[01]{10}$/.test(p)).slice(0, 2);
        for (const code of codes) {
          if (!map.has(code)) map.set(code, []);
          if (!map.get(code).includes(din)) map.get(code).push(din);
        }
      }
      state.custom8b10bCache = { text, map };
      return map;
    }

    function isUsingBuiltIn8b10bTable() {
      return !String($('custom8b10bTable')?.value || '').trim();
    }

    function active8b10bDecodeMap() {
      const custom = parseCustom8b10bTable();
      return custom;
    }

    function decode10bToByte(packetBits) {
      const raw = String(packetBits || '');
      const decodeMap = active8b10bDecodeMap();
      const lsbFirstToTableOrder = reverseBits(raw);
      const vals = decodeMap.get(lsbFirstToTableOrder);
      if (vals?.length) return { ok: true, byte: vals[0], order: 'LSB-first fixed', bits: lsbFirstToTableOrder, ambiguous: vals.length > 1 };
      const reason = decodeMap.size ? `table-order:${lsbFirstToTableOrder}` : `no 8b10b table; table-order:${lsbFirstToTableOrder}`;
      return { ok: false, byte: NaN, order: 'LSB-first fixed', bits: raw, ambiguous: false, tried: reason };
    }

    function getFieldDefs(kind, byteCount) {
      if (kind === 'CTRL_L') return CTRL_L_FIELDS;
      const known = new Map(CTRL_F_KNOWN_FIELDS.map(f => [`${f.byte}.${f.bit}`, f]));
      const fields = [];
      for (let byte = 0; byte < byteCount; byte++) {
        for (let bit = 0; bit < 8; bit++) {
          fields.push(known.get(`${byte}.${bit}`) || { byte, bit, name: 'Unknown/Reserved', reg: `CTRL_F.Byte${byte}[${bit}]` });
        }
      }
      return fields;
    }

    function extractCtrlBlocks(bits) {
      const bitStr = bits.join('');
      const blocks = [];
      const resolved = collectResolvedKMatches(bitStr, Infinity);
      for (const hit of resolved) {
        if (hit.name === 'K1') blocks.push(buildCtrlBlock('CTRL_L', hit.pos, hit.bitLen, bits, hit));
        if (hit.name === 'K4') blocks.push(buildCtrlBlock('CTRL_F', hit.pos, hit.bitLen, bits, hit));
      }
      return blocks.filter(Boolean).sort((a, b) => a.bitStart - b.bitStart);
    }

    function buildCtrlBlock(kind, kBitStart, kLen, bits, kMatch = null) {
      const byteCount = kind === 'CTRL_L' ? CHPI_RULES.ctrlLBytes : CHPI_RULES.ctrlFBytes;
      const tokenBits = CHPI_RULES.packetBits;
      const dataStart = kBitStart + kLen;
      if (dataStart + byteCount * tokenBits > bits.length) return null;
      const packets = [];
      const bytes = [];
      for (let i = 0; i < byteCount; i++) {
        const bitStart = dataStart + i * tokenBits;
        const raw10 = bits.slice(bitStart, bitStart + tokenBits).join('');
        const dec = decode10bToByte(raw10);
        packets.push({ index: i, bitStart, raw10, ...dec });
        bytes.push(dec.ok ? dec.byte : null);
      }
      const fields = getFieldDefs(kind, byteCount).map(f => ({
        ...f,
        bitStart: packets[f.byte]?.bitStart + Math.min(f.bit, tokenBits - 1),
        packetBitStart: packets[f.byte]?.bitStart,
        value: Number.isInteger(bytes[f.byte]) ? ((bytes[f.byte] >> f.bit) & 1) : null
      }));
      return { kind, kBitStart, kMismatch: kMatch?.mismatch || 0, kExact: kMatch?.exact !== false, bitStart: dataStart, byteCount, packets, bytes, fields };
    }

    function findPatternPositions(bitStr, pattern, maxHits = 20) {
      const hits = [];
      let pos = bitStr.indexOf(pattern);
      while (pos >= 0 && hits.length < maxHits) {
        hits.push(pos);
        pos = bitStr.indexOf(pattern, pos + 1);
      }
      return hits;
    }

    function getKFuzzyMismatch() {
      const v = Number($('chpiKFuzzy')?.value);
      if (!Number.isFinite(v)) return 1;
      return Math.max(0, Math.min(4, Math.round(v)));
    }

    function getKAllowedMismatch(name) {
      return getKFuzzyMismatch();
    }

    function hammingAt(bitStr, pos, pattern, maxMismatch = 0) {
      let mm = 0;
      for (let k = 0; k < pattern.length; k++) {
        if (bitStr[pos + k] !== pattern[k] && ++mm > maxMismatch) return mm;
      }
      return mm;
    }

    function collectPatternHits(bitStr, pattern, maxHits = Infinity, maxMismatch = 0) {
      const hits = [];
      const plen = pattern.length;
      if (!bitStr || bitStr.length < plen) return hits;
      for (let pos = 0; pos <= bitStr.length - plen; pos++) {
        const mismatch = hammingAt(bitStr, pos, pattern, maxMismatch);
        if (mismatch <= maxMismatch) {
          hits.push({ pos, mismatch, exact: mismatch === 0 });
          if (hits.length >= maxHits) break;
        }
      }
      return hits;
    }

    function findPatternFuzzy(bitStr, pattern, maxMismatch = 2, maxHits = 20) {
      const hits = [];
      const plen = pattern.length;
      if (!bitStr || bitStr.length < plen) return hits;
      for (let i = 0; i <= bitStr.length - plen; i++) {
        let mm = 0;
        for (let k = 0; k < plen; k++) {
          if (bitStr[i + k] !== pattern[k] && ++mm > maxMismatch) break;
        }
        if (mm <= maxMismatch) {
          hits.push({ pos: i, mismatch: mm });
          if (hits.length >= maxHits) break;
        }
      }
      return hits;
    }

    function nearestPattern(bitStr, pattern, step = 1) {
      const plen = pattern.length;
      if (!bitStr || bitStr.length < plen) return null;
      let best = { pos: -1, mismatch: plen + 1 };
      for (let i = 0; i <= bitStr.length - plen; i += step) {
        let mm = 0;
        for (let k = 0; k < plen; k++) if (bitStr[i + k] !== pattern[k]) mm++;
        if (mm < best.mismatch) {
          best = { pos: i, mismatch: mm };
          if (mm === 0) break;
        }
      }
      return best.pos >= 0 ? best : null;
    }

    function bitRangeToTimeRange(bitStart, bitLen, times, ui) {
      if (!times?.length || !Number.isFinite(ui) || ui <= 0) return null;
      const startIdx = Math.max(0, Math.min(times.length - 1, bitStart));
      const endIdx = Math.max(startIdx, Math.min(times.length - 1, bitStart + bitLen - 1));
      return {
        t0: times[startIdx] - 0.5 * ui,
        t1: times[endIdx] + 0.5 * ui,
        bitStart,
        bitLen
      };
    }

    function parseKPatterns(text) {
      const out = { full: {}, symbol: {} };
      for (const item of String(text || '').split(/[,\n;]/)) {
        const full = item.trim().match(/^(K[1-4])\s*=\s*([01]{40})$/i);
        if (full) {
          out.full[full[1].toUpperCase()] = full[2];
          continue;
        }
        const symbol = item.trim().match(/^([KG][1-4])(?:P|')?\s*=\s*([01]{10})$/i);
        if (symbol) out.symbol[symbol[1].toUpperCase()] = symbol[2];
      }
      return out;
    }

    function deriveKBitPattern(name, kPatterns) {
      if (kPatterns.full[name]) return kPatterns.full[name];
      const seq = CHPI_RULES.kCodeSequences[name] || [];
      const parts = [];
      for (const symbol of seq) {
        const key = symbol.replace("'", '').toUpperCase();
        if (!kPatterns.symbol[key]) return null;
        parts.push(kPatterns.symbol[key]);
      }
      return parts.join('');
    }

    function reverseBits(s) {
      return String(s).split('').reverse().join('');
    }

    function getKPatterns(name, kPatterns) {
      const derived = deriveKBitPattern(name, kPatterns);
      const base = derived ? [{ type: 'override', bits: derived }] : (CHPI_RULES.kCodePatterns[name] || []);
      const out = [];
      for (const p of base) {
        const wordSerial = reverseBits(p.bits);
        out.push({ type: `${p.type} whole-word LSB-first`, bits: wordSerial, sourceBits: p.bits, primary: true });
      }
      return out;
    }

    function scanKCodes(bitStr, maxHits = 8) {
      const kPatterns = parseKPatterns($('chpiKPatterns')?.value || '');
      const result = {};
      for (const name of CHPI_RULES.kCodes) {
        const patterns = getKPatterns(name, kPatterns);
        result[name] = patterns.map(p => {
          const matches = collectPatternHits(bitStr, p.bits, maxHits, getKAllowedMismatch(name));
          const hits = matches.filter(h => h.exact).map(h => h.pos);
          const fuzzy = matches.filter(h => !h.exact).map(h => ({ pos: h.pos, mismatch: h.mismatch }));
          const near = nearestPattern(bitStr, p.bits, Math.max(1, CHPI_RULES.packetBits));
          return { ...p, hits, fuzzy, matches, near };
        });
      }
      return result;
    }

    function allKSerialPatterns() {
      const kPatterns = parseKPatterns($('chpiKPatterns')?.value || '');
      const out = [];
      for (const name of CHPI_RULES.kCodes) {
        for (const pattern of getKPatterns(name, kPatterns)) {
          out.push({ ...pattern, name, bitLen: pattern.bits.length });
        }
      }
      return out;
    }

    function scoreKSyncBits(bitStr, maxHitsPerPattern = 80) {
      const patterns = allKSerialPatterns();
      const maxMismatch = getKFuzzyMismatch();
      const hits = [];
      for (const pattern of patterns) {
        for (const h of collectPatternHits(bitStr, pattern.bits, maxHitsPerPattern, maxMismatch)) {
          hits.push({ ...h, name: pattern.name, type: pattern.type, bitLen: pattern.bitLen });
        }
      }
      hits.sort((a, b) => a.pos - b.pos || a.mismatch - b.mismatch);
      const resolved = [];
      for (const h of hits.sort((a, b) => a.mismatch - b.mismatch || a.pos - b.pos)) {
        if (!resolved.some(r => rangesOverlap(h.pos, h.pos + h.bitLen, r.pos, r.pos + r.bitLen))) resolved.push(h);
      }
      const exact = resolved.filter(h => h.exact).length;
      const fuzzy = resolved.length - exact;
      const mismatchSum = resolved.reduce((sum, h) => sum + h.mismatch, 0);
      const kinds = new Set(resolved.map(h => h.name)).size;
      return {
        hits: resolved.sort((a, b) => a.pos - b.pos),
        exact,
        fuzzy,
        mismatchSum,
        kinds,
        score: exact * 1000 + fuzzy * 300 + kinds * 80 - mismatchSum * 20
      };
    }

    function refineClockByKCodes(samples, th, edges, baseUi) {
      if (!$('chpiKClockAssist')?.checked || !Number.isFinite(baseUi) || baseUi <= 0) return null;
      const spanPct = Math.max(0, Math.min(10, Number($('chpiKClockSpan')?.value) || 0));
      const maxBits = Math.max(1000, Math.min(200000, Number($('chpiKClockBits')?.value) || 12000));
      const startBase = edges.length ? edges[0].t : samples[0].t;
      const span = spanPct / 100;
      const scaleSteps = span > 0 ? 5 : 1;
      const phaseSteps = 8;
      let best = null;
      for (let si = 0; si < scaleSteps; si++) {
        const frac = scaleSteps === 1 ? 0 : -span + (2 * span * si) / (scaleSteps - 1);
        const ui = baseUi * (1 + frac);
        for (let pi = 0; pi < phaseSteps; pi++) {
          const phase = (pi + 0.5) / phaseSteps;
          const decoded = decodeBits(samples, th, ui, edges, { phase, startBase, maxBits });
          if (decoded.bits.length < CHPI_RULES.packetBits * 4) continue;
          const scored = scoreKSyncBits(decoded.bits.join(''), 80);
          const score = scored.score - Math.abs(frac) * 15;
          const candidate = { ui, phase, startBase, decoded, ...scored, score, frac };
          if (!best || candidate.score > best.score) best = candidate;
        }
      }
      if (!best || best.hits.length === 0) return null;
      return best;
    }

    function compareKCandidates(a, b) {
      if ((a.exact ? 1 : 0) !== (b.exact ? 1 : 0)) return a.exact ? -1 : 1;
      if (a.mismatch !== b.mismatch) return a.mismatch - b.mismatch;
      if (!a.exact && !b.exact && ((a.name === 'K2' && b.name === 'K3') || (a.name === 'K3' && b.name === 'K2'))) {
        return a.name === 'K2' ? -1 : 1;
      }
      const order = { K1: 0, K2: 1, K3: 2, K4: 3 };
      if (order[a.name] !== order[b.name]) return order[a.name] - order[b.name];
      return a.pos - b.pos;
    }

    function rangesOverlap(a0, a1, b0, b1) {
      return a0 < b1 && b0 < a1;
    }

    function collectResolvedKMatches(bitStr, maxHits = 200) {
      const scan = scanKCodes(bitStr, maxHits);
      const kPatterns = parseKPatterns($('chpiKPatterns')?.value || '');
      const patterns = [];
      for (const name of CHPI_RULES.kCodes) {
        for (const pattern of getKPatterns(name, kPatterns)) patterns.push({ ...pattern, name, bitLen: pattern.bits.length });
      }
      const candidates = [];
      const maxMismatch = getKFuzzyMismatch();
      const plen = patterns[0]?.bitLen || 40;
      for (let pos = 0; pos <= bitStr.length - plen; pos++) {
        let best = null;
        const rejectedHere = [];
        for (const pattern of patterns) {
          const mm = hammingAt(bitStr, pos, pattern.bits, maxMismatch);
          if (mm > maxMismatch) continue;
          const cand = {
            name: pattern.name,
            type: pattern.type,
            bits: pattern.bits,
            sourceBits: pattern.sourceBits,
            primary: pattern.primary,
            pos,
            mismatch: mm,
            exact: mm === 0,
            bitLen: pattern.bitLen
          };
          if (!best || compareKCandidates(cand, best) < 0) {
            if (best) rejectedHere.push({ ...best, rejectedBy: `${cand.name}@${cand.pos}` });
            best = cand;
          } else {
            rejectedHere.push({ ...cand, rejectedBy: `${best.name}@${best.pos}` });
          }
        }
        if (best) {
          best.rejectedSameStart = rejectedHere;
          candidates.push(best);
        }
      }
      const accepted = [];
      const rejected = candidates.flatMap(c => c.rejectedSameStart || []);
      for (const cand of candidates.sort(compareKCandidates)) {
        const conflict = accepted.find(a => rangesOverlap(cand.pos, cand.pos + cand.bitLen, a.pos, a.pos + a.bitLen));
        if (!conflict) {
          accepted.push(cand);
        } else {
          rejected.push({ ...cand, rejectedBy: `${conflict.name}@${conflict.pos}` });
        }
      }
      accepted.sort((a, b) => a.pos - b.pos || compareKCandidates(a, b));
      accepted.scan = scan;
      accepted.rejected = rejected;
      return accepted;
    }

    function buildKProbeChecks(bitStr) {
      const checks = [];
      const clean = String(bitStr || '').replace(/[^01]/g, '');
      function add(name, ok, detail, level = null) {
        checks.push({ name, ok, detail, level: level || (ok ? 'pass' : 'fail') });
      }
      add('K-code bit 串长度', clean.length >= 40, `${clean.length} bits`, clean.length >= 40 ? 'pass' : 'warn');
      if (clean.length < 40) return { checks, summary: 'WARN' };

      const scan = scanKCodes(clean, 50);
      for (const name of CHPI_RULES.kCodes) {
        const primary = scan[name].filter(p => p.primary);
        const primaryHits = primary.flatMap(p => (p.matches || p.hits.map(pos => ({ pos, mismatch: 0, exact: true }))).map(h => `${p.type}@${h.pos}${h.mismatch ? `(mm${h.mismatch})` : ''}`));
        const best = primary.filter(p => p.near).sort((a, b) => a.near.mismatch - b.near.mismatch)[0];
        const detail = primaryHits.length
          ? primaryHits.join(', ')
          : `no hit${best ? `; nearest ${best.type}@${best.near.pos}, mismatch=${best.near.mismatch}/40, nearBits=${clean.slice(best.near.pos, best.near.pos + 40)}` : ''}`;
        add(`Probe ${name}`, primaryHits.length > 0, detail, primaryHits.length ? 'pass' : 'warn');
      }
      const fail = checks.filter(c => c.level === 'fail').length;
      const warn = checks.filter(c => c.level === 'warn').length;
      return { checks, summary: fail ? 'FAIL' : warn ? 'WARN' : 'PASS' };
    }

    function runKProbeOnly() {
      const probe = String($('chpiBitProbe')?.value || '').replace(/[^01]/g, '');
      if (!probe) return false;
      const checks = buildKProbeChecks(probe);
      state.result = {
        samples: [],
        threshold: NaN,
        edges: [],
        ui: NaN,
        bits: probe.split('').map(Number),
        times: [],
        words: [],
        checks,
        annotations: [],
        ctrlBlocks: []
      };
      $('mSamples').textContent = '-';
      $('mDuration').textContent = '-';
      $('mThreshold').textContent = '-';
      $('mUI').textContent = '-';
      $('mBits').textContent = probe.length.toLocaleString();
      $('mCheck').innerHTML = `<span class="${checks.summary === 'PASS' ? 'pass' : checks.summary === 'WARN' ? 'warn' : 'fail'}">${checks.summary}</span>`;
      state.activeTab = 'checks';
      document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x.dataset.tab === 'checks'));
      renderTab();
      drawPlot();
      setStatus(`K-code 自检完成：${checks.summary}`, checks.summary === 'PASS' ? 'pass' : checks.summary === 'WARN' ? 'warn' : 'fail');
      return true;
    }

    function checkPacketBoundaryTransitions(bits, tokenBits) {
      const violations = [];
      const packetCount = Math.floor(bits.length / tokenBits);
      for (let i = 0; i < packetCount - 1; i++) {
        const prevLast = bits[i * tokenBits + tokenBits - 1];
        const nextFirst = bits[(i + 1) * tokenBits];
        if (prevLast === nextFirst) {
          violations.push(i);
          if (violations.length >= 20) break;
        }
      }
      return { packetCount, violations };
    }

    function detectChpiAnnotations(bits, times, ui) {
      const annotations = [];
      const diagnostics = [];
      const bitStr = bits.join('');
      const tokenBits = Math.max(4, Number($('chpiTokenBits')?.value) || CHPI_RULES.packetBits);
      const styles = {
        K1: '#1769aa',
        K2: '#0f8a5f',
        K3: '#7a4cc2',
        K4: '#b76b00',
        CTRL_L: '#0f8a5f',
        CTRL_F: '#b42318'
      };

      const resolved = collectResolvedKMatches(bitStr, Infinity);
      const byName = new Map(CHPI_RULES.kCodes.map(name => [name, 0]));
      for (const hit of resolved) {
        byName.set(hit.name, (byName.get(hit.name) || 0) + 1);
        const kRange = bitRangeToTimeRange(hit.pos, hit.bitLen, times, ui);
        const mmText = hit.mismatch ? ` mm=${hit.mismatch}/40` : '';
        if (kRange) annotations.push({ ...kRange, label: `${hit.name} ${hit.type}${mmText}`, color: styles[hit.name], kind: 'kcode', primary: hit.primary, mismatch: hit.mismatch });

        if (hit.name === 'K1') {
          const ctrlStart = hit.pos + hit.bitLen;
          const ctrlRange = bitRangeToTimeRange(ctrlStart, CHPI_RULES.ctrlLBytes * tokenBits, times, ui);
          if (ctrlRange) annotations.push({ ...ctrlRange, label: `CTRL_L${mmText ? ' after fuzzy K1' : ''}`, color: styles.CTRL_L, kind: 'ctrl' });
        } else if (hit.name === 'K4') {
          const ctrlStart = hit.pos + hit.bitLen;
          const ctrlRange = bitRangeToTimeRange(ctrlStart, CHPI_RULES.ctrlFBytes * tokenBits, times, ui);
          if (ctrlRange) annotations.push({ ...ctrlRange, label: `CTRL_F${mmText ? ' after fuzzy K4' : ''}`, color: styles.CTRL_F, kind: 'ctrl' });
        }
      }
      const scan = resolved.scan || scanKCodes(bitStr, Infinity);
      for (const name of CHPI_RULES.kCodes) {
        if (byName.get(name)) continue;
        const primaryPatterns = (scan[name] || []).filter(p => p.primary);
        const near = primaryPatterns
          .filter(p => p.near)
          .sort((a, b) => a.near.mismatch - b.near.mismatch)[0];
        diagnostics.push(near ? `${name}: not found after conflict resolve, nearest ${near.type} bit ${near.near.pos}, mismatch ${near.near.mismatch}/40` : `${name}: pattern not found`);
      }
      if (resolved.rejected?.length) diagnostics.push(`K conflict resolved: rejected ${resolved.rejected.slice(0, 8).map(x => `${x.name}@${x.pos}(mm${x.mismatch}) by ${x.rejectedBy}`).join(', ')}`);
      annotations.sort((a, b) => a.t0 - b.t0 || a.label.localeCompare(b.label));
      annotations.diagnostics = diagnostics;
      return annotations;
    }

    function checkChpiRules(bits, words, add) {
      if (!$('chpiEnable')?.checked) return;
      const bitStr = bits.join('');
      const tokenBits = Math.max(4, Number($('chpiTokenBits').value) || 10);
      const rate = Number.isFinite(state.result?.ui) && state.result.ui > 0 ? 1 / state.result.ui : NaN;
      add('CHPI 规则来源', true, CHPI_RULES.source, 'pass');
      add('CHPI packet 宽度', tokenBits === CHPI_RULES.packetBits, `当前=${tokenBits} bit, 文档 packet=10 bit`, tokenBits === 10 ? 'pass' : 'fail');

      if (Number.isFinite(rate)) {
        const gbps = rate / 1e9;
        add('CHPI data rate 范围', gbps >= CHPI_RULES.dataRateGbps.min && gbps <= CHPI_RULES.dataRateGbps.max, `${nice(gbps,4)} Gbps, 文档 1~3.7Gbps`);
        const uiNs = state.result.ui * 1e9;
        add('CHPI UI 范围', uiNs >= CHPI_RULES.uiNs.min && uiNs <= CHPI_RULES.uiNs.max, `${nice(uiNs,4)} ns, 文档 0.27~1ns`);
      } else {
        add('CHPI data rate / UI 范围', false, '无法从当前波形估计 UI', 'warn');
      }

      const packetCount = Math.floor(bits.length / tokenBits);
      add('CHPI 10b packet 数', packetCount > 0, `${packetCount} packets from ${bits.length} decoded bits`, packetCount > 0 ? 'pass' : 'warn');
      if (packetCount > 0) {
        add('CHPI LSP 40 packets 对齐初筛', packetCount >= CHPI_RULES.lspPackets, `LSP sequence = 40 packets; current capture has ${packetCount} packets`, packetCount >= 40 ? 'pass' : 'warn');
        const boundary = checkPacketBoundaryTransitions(bits, tokenBits);
        add('CHPI packet boundary transition', boundary.violations.length === 0, `文档 7.4 要求 packet bit9 与下一个 packet bit0 有跳变；violations=${boundary.violations.length}${boundary.violations.length ? ', first packet index ' + boundary.violations.join(', ') : ''}`, boundary.violations.length ? 'warn' : 'pass');
      }

      const minLsp = Math.max(0, Number($('chpiMinLsp').value) || CHPI_RULES.minLspSequences);
      const possibleLsp = Math.floor(packetCount / CHPI_RULES.lspPackets);
      add('CHPI LSP 最小发送次数', possibleLsp >= minLsp, `文档要求 LSP at least ${minLsp} sequences and at least 1us; 当前最多可容纳 ${possibleLsp} sequences`, possibleLsp >= minLsp ? 'pass' : 'warn');

      const resolvedK = collectResolvedKMatches(bitStr, Infinity);
      const scan = resolvedK.scan || scanKCodes(bitStr, Infinity);
      for (const name of CHPI_RULES.kCodes) {
        const seq = CHPI_RULES.kCodeSequences[name].join(' | ');
        const patterns = scan[name];
        const hitTexts = patterns.map(p => {
          const matches = p.matches || p.hits.map(pos => ({ pos, mismatch: 0, exact: true }));
          const preview = matches.slice(0, 12);
          const hitText = preview.length ? '@' + preview.map(x => x.pos + (x.mismatch ? `(mm${x.mismatch})` : '')).join('/') + (matches.length > preview.length ? '/...' : '') : '';
          return `${p.type}${p.primary ? '' : '*'}:${matches.length}${hitText}`;
        });
        const totalHits = patterns.reduce((sum, p) => sum + ((p.matches || p.hits || []).length), 0);
        const accepted = resolvedK.filter(x => x.name === name);
        const acceptedText = accepted.length ? `; accepted=${accepted.map(x => `${x.type}@${x.pos}${x.mismatch ? `(mm${x.mismatch})` : ''}`).join('/')}` : '; accepted=0';
        const primaryNear = patterns.filter(p => p.primary && p.near).sort((a, b) => a.near.mismatch - b.near.mismatch)[0];
        const nearText = primaryNear ? `; nearest primary=${primaryNear.type}@bit${primaryNear.near.pos}, mismatch=${primaryNear.near.mismatch}/40, nearBits=${bitStr.slice(primaryNear.near.pos, primaryNear.near.pos + 40)}` : '';
        add(`CHPI ${name} sequence`, accepted.length > 0, `${seq}; rawCandidates=${hitTexts.join(', ')}${acceptedText}${nearText}; allowed mismatch<=${getKAllowedMismatch(name)}; conflict rule=exact/mm/K2-before-K3 tie; fixed LSB-first: compare reversed 40'b[39:0] only`, accepted.length ? 'pass' : (totalHits ? 'warn' : 'warn'));
      }
      if (resolvedK.rejected?.length) {
        add('CHPI K-code 冲突仲裁', true, `rejected=${resolvedK.rejected.slice(0, 12).map(x => `${x.name}@${x.pos}(mm${x.mismatch}) by ${x.rejectedBy}`).join(', ')}`, 'warn');
      }

      const probe = String($('chpiBitProbe')?.value || '').replace(/[^01]/g, '');
      if (probe) {
        const probeScan = scanKCodes(probe, 20);
        const probeText = CHPI_RULES.kCodes.map(name => {
          const primary = probeScan[name].filter(p => p.primary);
          const hits = primary.flatMap(p => (p.matches || p.hits.map(pos => ({ pos, mismatch: 0, exact: true }))).map(h => `${p.type}@${h.pos}${h.mismatch ? `(mm${h.mismatch})` : ''}`));
          const best = primary.filter(p => p.near).sort((a, b) => a.near.mismatch - b.near.mismatch)[0];
          return `${name}:${hits.length ? hits.join('/') : 'no hit' + (best ? ` nearest ${best.near.mismatch}/40@${best.near.pos}` : '')}`;
        }).join('; ');
        add('CHPI K-code bit 串自检', true, `probeLen=${probe.length}; ${probeText}`, 'pass');
      }

      add('CHPI 8B/10B 应用关系', true, `K1~K4 本身不参与 8B/10B；CTRL_L=${CHPI_RULES.coding.ctrlL}; CTRL_F=${CHPI_RULES.coding.ctrlF}; IDLE=${CHPI_RULES.coding.idle}; LSP=${CHPI_RULES.coding.lsp}; Display=${CHPI_RULES.coding.displayData}; K-code=${CHPI_RULES.coding.kcode}`, 'pass');
      add('CHPI K-code 解码路径', true, 'K1~K4 按 40bit 特殊 pattern 直接匹配；匹配到 K1/K4 后，跳过整个 K-code，再对后续 CTRL payload 做 8B/10B 解码', 'pass');
      add('CHPI CTRL_L 长度', true, `CTRL_L located after K1; ${CHPI_RULES.ctrlLBytes} bytes, no scramble, payload 8B/10B encoded`, 'pass');
      add('CHPI CTRL_F 长度', true, `CTRL_F located after K4; ${CHPI_RULES.ctrlFBytes} bytes, no scramble, payload 8B/10B encoded; reserved bits should keep default low unless specified`, 'pass');

      if ($('chpiCheck420')?.checked) {
        const blocks420 = Math.floor(bits.length / 420);
        const rem420 = bits.length % 420;
        const blocks413 = Math.floor(bits.length / 413);
        add('兼容 413/420 编码长度检查', blocks420 > 0, `decoded=${bits.length} bits, 420b blocks=${blocks420}, rem=${rem420}, 413b-equivalent blocks=${blocks413}; 注意：这不是当前 PDF 7.4 的主描述`, blocks420 > 0 ? 'pass' : 'warn');
      }

      if ($('chpiCheckScramble')?.checked) {
        add('CHPI SCR/LFSR 规则', true, CHPI_RULES.scrambler + '；CTRL_L/CTRL_F 按你的设计不做 descramble；Display/IDLE descramble 尚未实现', 'warn');
      }

      add('CHPI 当前未覆盖项', true, 'CTRL_L/CTRL_F 已尝试 8B/10B 解码和字段解包；Display/IDLE G24 descramble 尚未实现；CTRL_F 字段名目前只内置部分已知项', 'warn');
    }

    function checkRules(samples, edges, ui, bits, words, th) {
      const checks = [];
      const duration = samples.at(-1).t - samples[0].t;
      const rate = Number.isFinite(ui) && ui > 0 ? 1 / ui : NaN;
      function add(name, ok, detail, level = null) {
        checks.push({ name, ok, detail, level: level || (ok ? 'pass' : 'fail') });
      }
      add('CSV 有效样点', samples.length > 10, `${samples.length} samples`);
      add('检测到边沿', edges.length > 0, `${edges.length} edges`, edges.length > 0 ? 'pass' : 'warn');
      add('UI / data rate 可用', Number.isFinite(ui) && ui > 0, Number.isFinite(rate) ? `${fmtRate(rate)} / UI ${fmtTime(ui)}` : '无法估计', Number.isFinite(ui) ? 'pass' : 'fail');
      add('解码 bit 数', bits.length > 0, `${bits.length} bits in ${fmtTime(duration)}`);
      const custom8b10b = parseCustom8b10bTable();
      const tableSource = isUsingBuiltIn8b10bTable() ? '内置 8b10b.xlsx 表' : 'textarea 覆盖表';
      add('8B/10B decode table', custom8b10b.size > 0, custom8b10b.size ? `使用${tableSource}，${custom8b10b.size} codes` : '未加载 8B/10B 表，CTRL byte 不会解码', custom8b10b.size ? 'pass' : 'fail');
      if (Number.isFinite(ui) && ui > 0 && duration > 0) {
        const avgDt = duration / Math.max(1, samples.length - 1);
        const samplesPerUi = ui / avgDt;
        add('采样密度', samplesPerUi >= 8, `${nice(samplesPerUi, 4)} samples/UI; 建议 >=8，低于 4 容易边沿变形/漏检`, samplesPerUi >= 8 ? 'pass' : samplesPerUi >= 4 ? 'warn' : 'fail');
      }

      const maxRun = Number($('maxRun').value) || 0;
      if (maxRun > 0 && bits.length) {
        let run = 1, worst = 1;
        for (let i = 1; i < bits.length; i++) {
          run = bits[i] === bits[i - 1] ? run + 1 : 1;
          worst = Math.max(worst, run);
        }
        add('最大连续相同比特', worst <= maxRun, `worst=${worst}, limit=${maxRun}`);
      }

      const minRate = Number($('minRate').value) || 0;
      const maxRate = Number($('maxRate').value) || 0;
      const unit = $('rateUnit').value;
      const scale = unit === 'Gbps' ? 1e9 : unit === 'Mbps' ? 1e6 : 1;
      if (minRate > 0) add('Data rate 下限', rate >= minRate * scale, `${fmtRate(rate)} >= ${minRate} ${unit}`);
      if (maxRate > 0) add('Data rate 上限', rate <= maxRate * scale, `${fmtRate(rate)} <= ${maxRate} ${unit}`);

      const bitStr = bits.join('');
      const patterns = $('patterns').value.split(/[,\s]+/).map(x => x.trim()).filter(Boolean);
      for (const p of patterns) {
        add(`包含 pattern ${p}`, bitStr.includes(p), bitStr.includes(p) ? `found at bit ${bitStr.indexOf(p)}` : 'not found');
      }

      checkChpiRules(bits, words, add);

      const fail = checks.filter(c => c.level === 'fail').length;
      const warn = checks.filter(c => c.level === 'warn').length;
      return { checks, summary: fail ? 'FAIL' : warn ? 'WARN' : 'PASS' };
    }

    async function decode() {
      if (!state.samples.length && !state.rawText && String($('chpiBitProbe')?.value || '').replace(/[^01]/g, '').length) {
        runKProbeOnly();
        return;
      }
      let samples = state.samples;
      if ((!samples.length || state.columnsDirty) && state.rawText) {
        const maxRows = Math.max(1000, Number($('maxRows').value) || 1000000);
        const maxSamples = Math.max(0, Number($('maxSamples').value) || 0);
        const result = await parseCsvInWorker({
          text: state.rawText,
          timeCol: Number($('timeCol').value),
          dataCol: Number($('voltCol').value),
          maxRows,
          maxSamples,
          statusPrefix: '解码前解析'
        });
        applyWorkerResult(result);
        samples = state.samples;
      }
      if (samples.length < 2) throw new Error('有效样点不足，请检查列选择');
      const th = getThreshold(samples);
      const edges = findEdges(samples, th);
      const autoRate = estimateUiRobust(edges);
      let ui = $('rateMode').value === 'manual' ? manualUi() : autoRate.ui;
      if (!Number.isFinite(ui) || ui <= 0) ui = manualUi();
      const kSync = refineClockByKCodes(samples, th, edges, ui);
      let decoded;
      if (kSync) {
        ui = kSync.ui;
        $('samplePhase').value = nice(kSync.phase, 4);
        writeManualRateFromUi(ui);
        decoded = decodeBits(samples, th, ui, edges, { phase: kSync.phase, startBase: kSync.startBase });
      } else {
        decoded = decodeBits(samples, th, ui, edges);
      }
      const words = wordsFromBits(decoded.bits);
      const checks = checkRules(samples, edges, ui, decoded.bits, words, th);
      if ($('rateMode').value !== 'manual') {
        checks.checks.push({
          name: '自动识别 data rate',
          ok: Number.isFinite(autoRate.ui),
          level: autoRate.confidence > 0.75 ? 'pass' : 'warn',
          detail: autoRate.detail
        });
      }
      if ($('chpiKClockAssist')?.checked) {
        checks.checks.push({
          name: 'K-code 辅助同步',
          ok: !!kSync,
          level: kSync ? 'pass' : 'warn',
          detail: kSync
            ? `使用 UI=${fmtTime(kSync.ui)} (${fmtRate(1 / kSync.ui)}), phase=${nice(kSync.phase, 4)} UI, exact=${kSync.exact}, fuzzy=${kSync.fuzzy}, kinds=${kSync.kinds}, mismatchSum=${kSync.mismatchSum}, scanBits=${kSync.decoded.bits.length}`
            : '未在当前 data rate 附近找到更好的 K-code 同步点；可增大 K辅助扫速率 ±% 或检查阈值/反相'
        });
      }
      const annotations = detectChpiAnnotations(decoded.bits, decoded.times, ui);
      const ctrlBlocks = extractCtrlBlocks(decoded.bits);
      const diag = annotations.diagnostics || [];
      for (const blk of ctrlBlocks) {
        if (blk.kind === 'CTRL_L') {
          const byte1 = blk.packets[1];
          checks.checks.push({
            name: 'CTRL_L LD_R decode',
            ok: !!byte1?.ok,
            level: byte1?.ok ? 'pass' : 'warn',
            detail: byte1?.ok
              ? `LD_R byte=0x${byte1.byte.toString(16).toUpperCase().padStart(2, '0')} raw10=${byte1.raw10} order=${byte1.order}`
              : `Byte1 8B/10B decode fail; raw10=${byte1?.raw10 || '-'}; ${byte1?.tried || ''}`
          });
        }
      }
      if ($('chpiEnable')?.checked) {
        checks.checks.push({
          name: 'CHPI 波形标注',
          ok: annotations.length > 0,
          level: annotations.length > 0 ? 'pass' : 'warn',
          detail: annotations.length > 0
            ? `已标注 ${annotations.length} 个区间：${annotations.slice(0, 12).map(a => a.label + '@bit' + a.bitStart).join(', ')}`
            : `未标注；${diag.length ? diag.join('; ') : '未找到 K-code pattern'}。需要填写 K1'/G1' 等 10b 真值或 K1~K4 40bit pattern`
        });
        const fail = checks.checks.filter(c => c.level === 'fail').length;
        const warn = checks.checks.filter(c => c.level === 'warn').length;
        checks.summary = fail ? 'FAIL' : warn ? 'WARN' : 'PASS';
      }
      state.result = { samples, threshold: th, edges, ui, bits: decoded.bits, times: decoded.times, words, checks, annotations, ctrlBlocks };
      updateMetrics();
      drawPlot();
      renderTab();
      setStatus(checks.summary, checks.summary === 'PASS' ? 'pass' : checks.summary === 'WARN' ? 'warn' : 'fail');
    }

    function updateMetrics() {
      const r = state.result;
      if (!r) return;
      const dur = r.samples.at(-1).t - r.samples[0].t;
      $('mSamples').textContent = r.samples.length.toLocaleString();
      $('mDuration').textContent = fmtTime(dur);
      $('mThreshold').textContent = nice(r.threshold, 5) + ' V';
      $('mUI').textContent = fmtTime(r.ui);
      $('mBits').textContent = r.bits.length.toLocaleString();
      $('mCheck').innerHTML = `<span class="${r.checks.summary === 'PASS' ? 'pass' : r.checks.summary === 'WARN' ? 'warn' : 'fail'}">${r.checks.summary}</span>`;
    }

    function currentPlotRange(samples) {
      if (!samples.length) return { t0: 0, t1: 1 };
      if (state.plotRangeOverride) return state.plotRangeOverride;
      let t0 = samples[0].t;
      let t1 = samples.at(-1).t;
      const r = state.result;
      const mode = $('plotXMode')?.value || 'all';
      if (r?.times?.length && mode === 'decoded') {
        t0 = r.times[0] - 0.5 * r.ui;
        t1 = r.times.at(-1) + 0.5 * r.ui;
      } else if (r?.times?.length && mode === 'window') {
        const start = Math.max(0, Number($('plotStartBit')?.value) || 0);
        const count = Math.max(10, Number($('plotBitCount')?.value) || 400);
        const end = Math.min(r.times.length - 1, start + count - 1);
        t0 = r.times[Math.min(start, r.times.length - 1)] - 0.5 * r.ui;
        t1 = r.times[end] + 0.5 * r.ui;
      }
      if (!Number.isFinite(t0) || !Number.isFinite(t1) || t1 <= t0) {
        t0 = samples[0].t;
        t1 = samples.at(-1).t;
      }
      return { t0, t1 };
    }

    function clampPlotRange(t0, t1) {
      const samples = state.samples;
      if (!samples.length || !Number.isFinite(t0) || !Number.isFinite(t1)) return null;
      const minT = samples[0].t;
      const maxT = samples.at(-1).t;
      const full = maxT - minT || 1;
      let span = Math.max(Math.abs(t1 - t0), full * 1e-6);
      span = Math.min(span, full);
      let a = Math.min(t0, t1);
      let b = a + span;
      if (a < minT) { a = minT; b = a + span; }
      if (b > maxT) { b = maxT; a = b - span; }
      return { t0: a, t1: b };
    }

    function setPlotOverride(t0, t1) {
      state.plotRangeOverride = clampPlotRange(t0, t1);
      drawPlot();
    }

    function clearPlotOverride() {
      state.plotRangeOverride = null;
      drawPlot();
    }

    function focusDecodedBit(bitIndex, label = '') {
      const r = state.result;
      if (!r?.times?.length || !Number.isFinite(r.ui) || bitIndex < 0 || bitIndex >= r.times.length) {
        setStatus('无法定位：bit 不在当前解码范围内', 'warn');
        return;
      }
      const t = r.times[bitIndex];
      const span = Math.max(r.ui * 80, (r.samples.at(-1).t - r.samples[0].t) * 0.002);
      state.selectedBit = { bitIndex, label, t };
      setPlotOverride(t - span / 2, t + span / 2);
      setStatus(`已定位 ${label || 'bit'} @ bit ${bitIndex}, ${fmtTime(t)}`, 'pass');
    }

    function canvasXToTime(canvas, clientX) {
      const rect = canvas.getBoundingClientRect();
      const x = (clientX - rect.left) / rect.width * canvas.width;
      const range = currentPlotRange(state.samples);
      const plotLeft = 64;
      const plotRight = canvas.width - 24;
      const frac = Math.max(0, Math.min(1, (x - plotLeft) / (plotRight - plotLeft)));
      return range.t0 + frac * (range.t1 - range.t0);
    }

    function visibleSamples(samples, t0, t1) {
      if (!samples.length) return [];
      const out = [];
      for (const s of samples) {
        if (s.t >= t0 && s.t <= t1) out.push(s);
      }
      if (!out.length) return samples.slice(0, 2);
      const firstIdx = Math.max(0, samples.findIndex(s => s.t >= t0) - 1);
      const lastIdx = Math.min(samples.length - 1, firstIdx + out.length + 1);
      if (samples[firstIdx] && samples[firstIdx].t < out[0].t) out.unshift(samples[firstIdx]);
      if (samples[lastIdx] && samples[lastIdx].t > out.at(-1).t) out.push(samples[lastIdx]);
      return out;
    }

    function drawAnnotation(ctx, ann, xmap, plotTop, plotBottom, index) {
      const x0 = xmap(ann.t0);
      const x1 = xmap(ann.t1);
      const plotLeft = 64;
      const plotRight = ctx.canvas.width - 24;
      const left = Math.max(plotLeft, Math.min(x0, x1));
      const right = Math.min(plotRight, Math.max(x0, x1));
      if (right < plotLeft || left > plotRight || right - left < 1) return;
      const labelY = plotTop + 6 + (index % 4) * 22;
      ctx.save();
      ctx.fillStyle = ann.kind === 'ctrl' ? hexToRgba(ann.color, 0.10) : hexToRgba(ann.color, 0.16);
      ctx.fillRect(left, plotTop, Math.max(2, right - left), plotBottom - plotTop);
      ctx.strokeStyle = ann.color;
      ctx.lineWidth = ann.kind === 'ctrl' ? 1.4 : 1;
      ctx.strokeRect(left, plotTop, Math.max(2, right - left), plotBottom - plotTop);
      ctx.font = '12px Arial, Helvetica, sans-serif';
      const text = `${ann.label} @${ann.bitStart}`;
      const tw = ctx.measureText(text).width + 10;
      const tx = Math.max(plotLeft + 2, Math.min(left + 3, ctx.canvas.width - tw - 22));
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = ann.color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      roundedRectPath(ctx, tx, labelY, tw, 18, 4);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = ann.color;
      ctx.fillText(text, tx + 5, labelY + 13);
      ctx.restore();
    }

    function roundedRectPath(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
    }

    function hexToRgba(hex, alpha) {
      const h = String(hex).replace('#', '');
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function niceTicks(min, max, count = 6) {
      if (!Number.isFinite(min) || !Number.isFinite(max) || min === max) return [min || 0];
      const span = Math.abs(max - min);
      const rawStep = span / Math.max(1, count);
      const pow = Math.pow(10, Math.floor(Math.log10(rawStep)));
      const frac = rawStep / pow;
      const niceFrac = frac <= 1 ? 1 : frac <= 2 ? 2 : frac <= 5 ? 5 : 10;
      const step = niceFrac * pow;
      const start = Math.ceil(Math.min(min, max) / step) * step;
      const end = Math.floor(Math.max(min, max) / step) * step;
      const ticks = [];
      for (let v = start; v <= end + step * 0.5 && ticks.length < 20; v += step) {
        ticks.push(Math.abs(v) < step * 1e-9 ? 0 : v);
      }
      if (!ticks.length) ticks.push(min, max);
      return ticks;
    }

    function drawPlotAxes(ctx, dims, t0, t1, ymin, ymax, xmap, ymap) {
      const { left, right, top, bottom, w, h } = dims;
      ctx.save();
      ctx.font = '11px Arial, Helvetica, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#e3ebf3';
      ctx.fillStyle = '#5f6f82';
      ctx.lineWidth = 1;

      const yTicks = niceTicks(ymin, ymax, 6);
      for (const v of yTicks) {
        const y = ymap(v);
        if (y < top - 1 || y > bottom + 1) continue;
        ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
        ctx.strokeStyle = '#aebdca';
        ctx.beginPath(); ctx.moveTo(left - 5, y); ctx.lineTo(left, y); ctx.stroke();
        ctx.strokeStyle = '#e3ebf3';
        ctx.textAlign = 'right';
        ctx.fillText(nice(v, 4), left - 8, y);
      }

      const xTicks = niceTicks(t0, t1, 8);
      ctx.textBaseline = 'top';
      for (const t of xTicks) {
        const x = xmap(t);
        if (x < left - 1 || x > right + 1) continue;
        ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bottom); ctx.stroke();
        ctx.strokeStyle = '#aebdca';
        ctx.beginPath(); ctx.moveTo(x, bottom); ctx.lineTo(x, bottom + 5); ctx.stroke();
        ctx.strokeStyle = '#e3ebf3';
        ctx.textAlign = 'center';
        ctx.fillText(fmtTime(t), x, bottom + 8);
      }

      ctx.strokeStyle = '#8ea0b2';
      ctx.beginPath();
      ctx.moveTo(left, top);
      ctx.lineTo(left, bottom);
      ctx.lineTo(right, bottom);
      ctx.stroke();
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('V', 12, top + 8);
      ctx.textAlign = 'right';
      ctx.fillText('time', Math.min(w - 10, right), h - 8);
      ctx.restore();
    }

    function drawPlot() {
      const canvas = $('plot');
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#fbfdff';
      ctx.fillRect(0, 0, w, h);
      const plotLeft = 64;
      const plotRight = w - 24;
      const plotTop = 16;
      const plotBottom = h - 52;
      const samples = state.samples.length ? state.samples : [];
      if (!samples.length) {
        ctx.fillStyle = '#637181';
        ctx.fillText('No waveform', w / 2 - 35, h / 2);
        return;
      }
      const range = currentPlotRange(samples);
      const t0 = range.t0, t1 = range.t1;
      const viewSamples = visibleSamples(samples, t0, t1);
      const ySource = $('plotAutoY')?.checked ? viewSamples : samples;
      const vals = ySource.map(s => s.v);
      const mm = minMax(vals);
      const v0 = mm.min, v1 = mm.max;
      const pad = (v1 - v0) * 0.12 || 1;
      const ymin = v0 - pad, ymax = v1 + pad;
      const xmap = t => plotLeft + (t - t0) / (t1 - t0 || 1) * (plotRight - plotLeft);
      const ymap = v => plotTop + (ymax - v) / (ymax - ymin || 1) * (plotBottom - plotTop);

      drawPlotAxes(ctx, { left: plotLeft, right: plotRight, top: plotTop, bottom: plotBottom, w, h }, t0, t1, ymin, ymax, xmap, ymap);

      if (state.result && $('plotAnnotations')?.checked) {
        const anns = state.result.annotations || [];
        const visible = anns.filter(a => a.t1 >= t0 && a.t0 <= t1).slice(0, 80);
        visible.forEach((ann, i) => drawAnnotation(ctx, ann, xmap, plotTop, plotBottom, i));
        if (!anns.length && state.result.bits?.length) {
          const diag = anns.diagnostics || [];
          const text = diag.length ? 'No CHPI annotation: ' + diag.slice(0, 2).join('; ') : 'No CHPI annotation';
          ctx.save();
          ctx.fillStyle = 'rgba(180, 35, 24, .08)';
          ctx.strokeStyle = 'rgba(180, 35, 24, .45)';
          ctx.fillRect(w - 392, 22, 364, 26);
          ctx.strokeRect(w - 392, 22, 364, 26);
          ctx.fillStyle = '#b42318';
          ctx.font = '12px Arial, Helvetica, sans-serif';
          ctx.fillText(text.slice(0, 58), w - 382, 39);
          ctx.restore();
        }
      }

      ctx.strokeStyle = '#1769aa';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      const step = Math.max(1, Math.floor(viewSamples.length / 6000));
      let first = true;
      for (let i = 0; i < viewSamples.length; i += step) {
        const x = xmap(viewSamples[i].t), y = ymap(viewSamples[i].v);
        if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
      }
      ctx.stroke();

      if (state.result) {
        const thY = ymap(state.result.threshold);
        ctx.strokeStyle = '#b42318';
        ctx.setLineDash([6, 5]);
        ctx.beginPath(); ctx.moveTo(plotLeft, thY); ctx.lineTo(plotRight, thY); ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = 'rgba(15, 138, 95, .35)';
        ctx.lineWidth = 1;
        for (let i = 0; i < state.result.times.length; i += Math.max(1, Math.floor(state.result.times.length / 260))) {
          const x = xmap(state.result.times[i]);
          if (x < plotLeft || x > plotRight) continue;
          ctx.beginPath(); ctx.moveTo(x, plotTop); ctx.lineTo(x, plotBottom); ctx.stroke();
        }
      }
      if (state.result?.times?.length && state.selectedBit) {
        const sel = state.selectedBit;
        const t = state.result.times[sel.bitIndex];
        if (Number.isFinite(t)) {
          const x = xmap(t);
          const x0 = xmap(t - state.result.ui / 2);
          const x1 = xmap(t + state.result.ui / 2);
          if (x1 >= plotLeft && x0 <= plotRight) {
            ctx.save();
            ctx.fillStyle = 'rgba(255, 193, 7, .22)';
            ctx.fillRect(Math.max(plotLeft, x0), plotTop, Math.max(2, Math.min(plotRight, x1) - Math.max(plotLeft, x0)), plotBottom - plotTop);
            ctx.strokeStyle = '#d99a00';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(x, plotTop); ctx.lineTo(x, plotBottom); ctx.stroke();
            ctx.fillStyle = '#7a5200';
            ctx.font = '12px Arial, Helvetica, sans-serif';
            ctx.fillText(`${sel.label || 'selected'} bit ${sel.bitIndex}`, Math.max(plotLeft + 4, Math.min(x + 6, w - 180)), 62);
            ctx.restore();
          }
        }
      }
      ctx.fillStyle = '#637181';
      const annCount = state.result?.annotations?.length || 0;
      const modeText = state.plotRangeOverride ? '    mouse scale' : '';
      ctx.fillText(`t: ${fmtTime(t0)} to ${fmtTime(t1)}    v: ${nice(v0,4)} to ${nice(v1,4)} V${annCount ? '    annotations: ' + annCount : ''}${modeText}    wheel zoom / drag pan / dblclick reset`, 44, h - 11);
    }

    function ctrlTrendSpecFromField(field) {
      const byte = Number(field.byte);
      const bit = Number(field.bit ?? field.fieldBit);
      const name = String(field.name || '');
      const reg = String(field.reg || `CTRL_L.Byte${byte}[${bit}]`);
      if (/^LD_R\[\d+\]$/.test(name) || byte === 1) {
        return { kind: 'CTRL_L', mode: 'byte', key: 'byte:1', byte: 1, bit: null, title: 'LD_R[7:0]', reg: 'CTRL_L.Byte1[7:0]' };
      }
      if (/^LD_W\[\d+\]$/.test(name) || byte === 2) {
        return { kind: 'CTRL_L', mode: 'byte', key: 'byte:2', byte: 2, bit: null, title: 'LD_W[7:0]', reg: 'CTRL_L.Byte2[7:0]' };
      }
      if (/^LOAD\[\d+\]$/.test(name) || (byte === 3 && (bit === 4 || bit === 5))) {
        return { kind: 'CTRL_L', mode: 'field2', key: 'load', byte: 3, bit: 4, title: 'LOAD[1:0]', reg: 'CTRL_L.Byte3[5:4]' };
      }
      return { kind: 'CTRL_L', mode: 'bit', key: `bit:${byte}.${bit}`, byte, bit, title: name || reg, reg };
    }

    function ctrlTrendValueForBlock(block, spec) {
      const byteVal = block.bytes?.[spec.byte];
      const packet = block.packets?.[spec.byte];
      const base = {
        bitStart: spec.mode === 'bit' ? (packet?.bitStart ?? block.bitStart) + spec.bit : packet?.bitStart ?? block.bitStart,
        byteText: Number.isInteger(byteVal) ? '0x' + byteVal.toString(16).toUpperCase().padStart(2, '0') : 'decode fail'
      };
      if (!Number.isInteger(byteVal)) return { ...base, value: null, shortText: '-', longText: '-', changedKey: 'null' };
      if (spec.mode === 'byte') {
        const hex = '0x' + byteVal.toString(16).toUpperCase().padStart(2, '0');
        return { ...base, value: byteVal, shortText: hex, longText: `${hex} / ${byteVal.toString(2).padStart(8, '0')}b / ${byteVal}`, changedKey: String(byteVal) };
      }
      if (spec.mode === 'field2') {
        const v = (byteVal >> spec.bit) & 0x3;
        return { ...base, value: v, shortText: String(v), longText: `${v} / ${v.toString(2).padStart(2, '0')}b`, changedKey: String(v) };
      }
      const v = (byteVal >> spec.bit) & 1;
      return { ...base, value: v, shortText: String(v), longText: String(v), changedKey: String(v) };
    }

    function isCtrlTrendSelected(field) {
      const spec = state.selectedCtrlTrend;
      if (!spec) return false;
      return ctrlTrendSpecFromField(field).key === spec.key;
    }

    function selectCtrlTrendFromDataset(ds) {
      state.selectedCtrlTrend = ctrlTrendSpecFromField({
        byte: ds.byte,
        bit: ds.fieldBit,
        name: ds.name,
        reg: ds.reg
      });
    }

    function renderCtrlTrend(blocks) {
      const spec = state.selectedCtrlTrend;
      if (!spec || spec.kind !== 'CTRL_L') return '';
      const ctrlLs = blocks.filter(b => b.kind === 'CTRL_L').sort((a, b) => a.bitStart - b.bitStart);
      if (!ctrlLs.length) return '';
      let prevKey = null;
      let changes = 0;
      const rows = ctrlLs.map((blk, i) => {
        const v = ctrlTrendValueForBlock(blk, spec);
        const changed = i > 0 && v.changedKey !== prevKey;
        if (changed) changes++;
        prevKey = v.changedKey;
        const t = state.result?.times?.[v.bitStart];
        return { index: i, blk, ...v, changed, time: Number.isFinite(t) ? fmtTime(t) : '-' };
      });
      const chips = rows.slice(0, 80).map(r => `<span class="ctrlTrendChip ctrlTrendJump${r.changed ? ' changed' : ''}" data-bit="${r.bitStart}" data-label="${esc(spec.title + ' #' + r.index)}">#${r.index}: ${esc(r.shortText)}${r.changed ? ' *' : ''}</span>`).join('');
      const more = rows.length > 80 ? `<span class="ctrlTrendChip">... ${rows.length - 80} more</span>` : '';
      return `
        <div class="ctrlTrend">
          <h2>CTRL_L ${esc(spec.title)} value trend</h2>
          <div class="ctrlTrendMeta">
            <span class="pill">${esc(spec.reg)}</span>
            <span class="pill">${rows.length} captures</span>
            <span class="pill">${changes} changes</span>
            <span class="pill">点击下面任一行可定位波形</span>
          </div>
          <div class="ctrlTrendChipRow">${chips}${more}</div>
          <table><thead><tr><th>#</th><th>CTRL_L bit</th><th>Time</th><th>Value</th><th>Decoded byte</th><th>Change</th></tr></thead><tbody>
            ${rows.map(r => `<tr class="ctrlTrendJump" data-bit="${r.bitStart}" data-label="${esc(spec.title + ' #' + r.index)}"><td>${r.index}</td><td>${r.blk.bitStart}</td><td>${r.time}</td><td>${esc(r.longText)}</td><td>${esc(r.byteText)}</td><td>${r.changed ? '<span class="warn">changed</span>' : ''}</td></tr>`).join('')}
          </tbody></table>
        </div>
      `;
    }

    function renderTab() {
      const r = state.result;
      const body = $('tabBody');
      if (!r) { body.innerHTML = '<div class="empty">导入 CSV 后点击“解码”。</div>'; return; }
      if (state.activeTab === 'checks') {
        body.innerHTML = `<table><thead><tr><th>项目</th><th>结果</th><th>说明</th></tr></thead><tbody>${
          r.checks.checks.map(c => `<tr><td>${esc(c.name)}</td><td class="${c.level}">${c.level.toUpperCase()}</td><td>${esc(c.detail)}</td></tr>`).join('')
        }</tbody></table>`;
      } else if (state.activeTab === 'ctrl') {
        const blocks = r.ctrlBlocks || [];
        if (!blocks.length) {
          body.innerHTML = '<div class="empty">未检测到 CTRL_L/CTRL_F。需要先检测到 K1/K4。</div>';
        } else {
          body.innerHTML = renderCtrlTrend(blocks) + blocks.map((blk, idx) => `
            <h2>${esc(blk.kind)} #${idx} payload @ bit ${blk.bitStart} (K-code ${blk.kBitStart}~${blk.bitStart - 1}, K not 8B/10B${blk.kMismatch ? ', fuzzy mm=' + blk.kMismatch + '/40' : ''})</h2>
            <table><thead><tr><th>Packet</th><th>Bit start</th><th>Raw 10b</th><th>Table-order 10b</th><th>8b decoded</th><th>Order</th></tr></thead><tbody>
              ${blk.packets.map(p => `<tr class="ctrlLocate" data-bit="${p.bitStart}" data-label="${esc(blk.kind + ' packet' + p.index)}"><td>${p.index}</td><td>${p.bitStart}</td><td class="bits">${p.raw10}</td><td class="bits">${p.ok ? p.bits : reverseBits(p.raw10)}</td><td>${p.ok ? '0x' + p.byte.toString(16).toUpperCase().padStart(2, '0') : 'decode fail'}</td><td>${esc(p.ok ? p.order + (p.ambiguous ? ' ambiguous' : '') : p.tried || '-')}</td></tr>`).join('')}
            </tbody></table>
            <table style="margin-top:10px"><thead><tr><th>Byte</th><th>Bit</th><th>Reg</th><th>Name</th><th>Value</th><th>Byte decode</th></tr></thead><tbody>
              ${blk.fields.map(f => {
                const p = blk.packets[f.byte];
                const btxt = p?.ok ? '0x' + p.byte.toString(16).toUpperCase().padStart(2, '0') : `fail raw=${p?.raw10 || '-'}`;
                const label = `${blk.kind} ${f.reg} ${f.name}`;
                const selected = blk.kind === 'CTRL_L' && isCtrlTrendSelected(f) ? ' ctrlTrendSelected' : '';
                return `<tr class="ctrlLocate${selected}" data-bit="${f.bitStart}" data-label="${esc(label)}" data-kind="${esc(blk.kind)}" data-reg="${esc(f.reg)}" data-name="${esc(f.name)}" data-byte="${f.byte}" data-field-bit="${f.bit}"><td>${f.byte}</td><td>${f.bit}</td><td>${esc(f.reg)}</td><td>${esc(f.name)}</td><td>${f.value == null ? '-' : f.value}</td><td>${esc(btxt)}</td></tr>`;
              }).join('')}
            </tbody></table>
          `).join('');
        }
      } else if (state.activeTab === 'words') {
        body.innerHTML = `<table><thead><tr><th>#</th><th>Bit start</th><th>Bits</th><th>Hex</th><th>Dec</th></tr></thead><tbody>${
          r.words.map(w => `<tr><td>${w.index}</td><td>${w.bitStart}</td><td class="bits">${w.bits}</td><td>${w.hex}</td><td>${w.value}</td></tr>`).join('')
        }</tbody></table>`;
      } else if (state.activeTab === 'bits') {
        const grouped = r.bits.join('').replace(/(.{8})/g, '$1 ');
        body.innerHTML = `<div class="bits">${grouped || '无 bit'}</div>`;
      } else {
        body.innerHTML = `<table><thead><tr><th>#</th><th>Time</th><th>Edge</th></tr></thead><tbody>${
          r.edges.slice(0, 1000).map((e, i) => `<tr><td>${i}</td><td>${fmtTime(e.t)}</td><td>${e.from} -> ${e.to}</td></tr>`).join('')
        }</tbody></table>`;
      }
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function nice(v, digits = 4) {
      if (!Number.isFinite(v)) return '-';
      return Number(v).toPrecision(digits).replace(/\.?0+($|e)/, '$1');
    }

    function fmtTime(s) {
      if (!Number.isFinite(s)) return '-';
      const a = Math.abs(s);
      if (a >= 1) return nice(s, 4) + ' s';
      if (a >= 1e-3) return nice(s * 1e3, 4) + ' ms';
      if (a >= 1e-6) return nice(s * 1e6, 4) + ' us';
      if (a >= 1e-9) return nice(s * 1e9, 4) + ' ns';
      if (a >= 1e-12) return nice(s * 1e12, 4) + ' ps';
      return nice(s, 4) + ' s';
    }

    function fmtRate(hz) {
      if (!Number.isFinite(hz)) return '-';
      if (hz >= 1e9) return nice(hz / 1e9, 4) + ' Gbps';
      if (hz >= 1e6) return nice(hz / 1e6, 4) + ' Mbps';
      if (hz >= 1e3) return nice(hz / 1e3, 4) + ' kbps';
      return nice(hz, 4) + ' bps';
    }

    function exportReport() {
      if (!state.result) return;
      const report = {
        generatedAt: new Date().toISOString(),
        columns: { time: $('timeCol').selectedOptions[0]?.textContent, voltage: $('voltCol').selectedOptions[0]?.textContent },
        settings: {
          threshold: state.result.threshold,
          ui: state.result.ui,
          wordBits: Number($('wordBits').value),
          bitOrder: 'lsb-fixed'
        },
        checks: state.result.checks.checks,
        words: state.result.words,
        annotations: state.result.annotations || [],
        ctrlBlocks: state.result.ctrlBlocks || [],
        bitCount: state.result.bits.length
      };
      const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'waveform_protocol_report.json';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    $('file').addEventListener('change', async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      try {
        const seq = ++state.buildSeq;
        const maxRows = Math.max(1000, Number($('maxRows').value) || 1000000);
        const maxSamples = Math.max(0, Number($('maxSamples').value) || 0);
        setStatus(`读取中 ${f.name}`);
        state.rawText = await readCsvPreview(f, maxRows);
        if (seq !== state.buildSeq) return;
        const result = await parseCsvInWorker({
          text: state.rawText,
          maxRows,
          maxSamples,
          statusPrefix: '解析预览'
        });
        applyWorkerResult(result);
        const mb = (f.size / 1024 / 1024).toFixed(1);
        setStatus(`已载入 ${mb} MB，处理 ${result.rowLimit.toLocaleString()} 行，${result.decimStep > 1 ? '抽样步长 ' + result.decimStep : '未抽样'}`, 'pass');
      } catch (err) {
        setStatus('CSV 解析失败', 'fail');
        alert(err.message);
      }
    });

    $('reload').addEventListener('click', async () => {
      try {
        if (!state.rawText) throw new Error('请先载入 CSV');
        const maxRows = Math.max(1000, Number($('maxRows').value) || 1000000);
        const maxSamples = Math.max(0, Number($('maxSamples').value) || 0);
        const result = await parseCsvInWorker({
          text: state.rawText,
          timeCol: Number($('timeCol').value),
          dataCol: Number($('voltCol').value),
          maxRows,
          maxSamples,
          statusPrefix: '重新解析'
        });
        applyWorkerResult(result);
        setStatus('已重新解析', 'pass');
      } catch (err) { alert(err.message); }
    });
    $('decode').addEventListener('click', () => {
      decode().catch((err) => { setStatus('解码失败', 'fail'); alert(err.message); });
    });
    $('autoRate').addEventListener('click', async () => {
      try {
        let samples = state.samples;
        if ((!samples.length || state.columnsDirty) && state.rawText) {
          const maxRows = Math.max(1000, Number($('maxRows').value) || 1000000);
          const maxSamples = Math.max(0, Number($('maxSamples').value) || 0);
          const result = await parseCsvInWorker({
            text: state.rawText,
            timeCol: Number($('timeCol').value),
            dataCol: Number($('voltCol').value),
            maxRows,
            maxSamples,
            statusPrefix: '识别速率前解析'
          });
          applyWorkerResult(result);
          samples = state.samples;
        }
        if (samples.length < 2) throw new Error('请先载入 CSV 波形');
        const th = getThreshold(samples);
        const edges = findEdges(samples, th);
        const est = estimateUiRobust(edges);
        if (!Number.isFinite(est.ui) || est.ui <= 0) throw new Error(est.detail || '无法识别 data rate');
        writeManualRateFromUi(est.ui);
        setStatus(`已识别速率：${est.detail}`, est.confidence > 0.75 ? 'pass' : 'warn');
      } catch (err) {
        setStatus('识别速率失败', 'fail');
        alert(err.message);
      }
    });
    $('plotFit').addEventListener('click', () => {
      const r = state.result;
      if (r?.annotations?.length) {
        const first = r.annotations[0];
        $('plotXMode').value = 'window';
        $('plotStartBit').value = Math.max(0, first.bitStart - 30);
        $('plotBitCount').value = Math.max(200, Math.min(1200, first.bitLen + 180));
      } else if (r?.times?.length) {
        $('plotXMode').value = 'decoded';
      } else {
        $('plotXMode').value = 'all';
      }
      $('plotAutoY').checked = true;
      state.plotRangeOverride = null;
      drawPlot();
    });
    $('exportReport').addEventListener('click', exportReport);
    $('tabBody').addEventListener('click', (e) => {
      const jump = e.target.closest?.('.ctrlTrendJump');
      if (jump) {
        const bit = Number(jump.dataset.bit);
        const label = jump.dataset.label || '';
        if (Number.isFinite(bit)) focusDecodedBit(bit, label);
        return;
      }
      const row = e.target.closest?.('.ctrlLocate');
      if (!row) return;
      const bit = Number(row.dataset.bit);
      const label = row.dataset.label || '';
      if (row.dataset.kind === 'CTRL_L' && row.dataset.reg) {
        selectCtrlTrendFromDataset(row.dataset);
        renderTab();
      }
      if (Number.isFinite(bit)) focusDecodedBit(bit, label);
    });
    for (const b of document.querySelectorAll('.tab')) {
      b.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        state.activeTab = b.dataset.tab;
        renderTab();
      });
    }
    $('thresholdMode').addEventListener('change', () => $('threshold').disabled = $('thresholdMode').value === 'auto');
    $('rateMode').addEventListener('change', () => $('dataRate').disabled = $('rateMode').value === 'auto');
    $('timeCol').addEventListener('change', markColumnsChanged);
    $('voltCol').addEventListener('change', markColumnsChanged);
    for (const id of ['plotXMode', 'plotStartBit', 'plotBitCount', 'plotAutoY', 'plotAnnotations']) {
      $(id).addEventListener('input', () => {
        if (id === 'plotXMode' || id === 'plotStartBit' || id === 'plotBitCount') state.plotRangeOverride = null;
        drawPlot();
      });
      $(id).addEventListener('change', () => {
        if (id === 'plotXMode' || id === 'plotStartBit' || id === 'plotBitCount') state.plotRangeOverride = null;
        drawPlot();
      });
    }
    const plotCanvas = $('plot');
    plotCanvas.addEventListener('wheel', (e) => {
      if (!state.samples.length) return;
      e.preventDefault();
      const range = currentPlotRange(state.samples);
      const anchor = canvasXToTime(plotCanvas, e.clientX);
      const zoom = Math.exp(Math.sign(e.deltaY) * 0.22);
      const newSpan = (range.t1 - range.t0) * zoom;
      const frac = (anchor - range.t0) / (range.t1 - range.t0 || 1);
      setPlotOverride(anchor - newSpan * frac, anchor + newSpan * (1 - frac));
    }, { passive: false });
    plotCanvas.addEventListener('pointerdown', (e) => {
      if (!state.samples.length) return;
      plotCanvas.setPointerCapture(e.pointerId);
      plotCanvas.classList.add('dragging');
      const range = currentPlotRange(state.samples);
      state.plotDrag = { pointerId: e.pointerId, x: e.clientX, t0: range.t0, t1: range.t1 };
    });
    plotCanvas.addEventListener('pointermove', (e) => {
      const drag = state.plotDrag;
      if (!drag || drag.pointerId !== e.pointerId) return;
      const rect = plotCanvas.getBoundingClientRect();
      const dt = -(e.clientX - drag.x) / rect.width * (drag.t1 - drag.t0);
      setPlotOverride(drag.t0 + dt, drag.t1 + dt);
    });
    function endPlotDrag(e) {
      if (state.plotDrag && (!e || state.plotDrag.pointerId === e.pointerId)) {
        state.plotDrag = null;
        plotCanvas.classList.remove('dragging');
      }
    }
    plotCanvas.addEventListener('pointerup', endPlotDrag);
    plotCanvas.addEventListener('pointercancel', endPlotDrag);
    plotCanvas.addEventListener('dblclick', clearPlotOverride);
    $('threshold').disabled = true;
    $('dataRate').disabled = true;
    drawPlot();
  </script>
</body>
</html>
