<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waveform Protocol Checker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #fff;
      --ink: #18212b;
      --muted: #637181;
      --line: #d8e1ea;
      --line-soft: #e8eef4;
      --accent: #1769aa;
      --accent-2: #0f8a5f;
      --warn: #b76b00;
      --bad: #b42318;
      --good: #087443;
      --chip: #f3f7fb;
      --shadow: 0 10px 24px rgba(24, 33, 43, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
      font-size: 13px;
    }
    header {
      height: 58px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }
    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .side {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section {
      padding: 14px;
      border-bottom: 1px solid var(--line-soft);
    }
    .section:last-child { border-bottom: 0; }
    h2 {
      margin: 0 0 10px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #344252;
    }
    label {
      display: block;
      color: var(--muted);
      margin-bottom: 5px;
      font-size: 12px;
    }
    input, select, textarea, button {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
    }
    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px dashed #b6c4d2;
      border-radius: 7px;
      background: #f8fbfd;
    }
    input[type="number"], input[type="text"], select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 8px;
      background: #fff;
      color: var(--ink);
    }
    textarea {
      min-height: 74px;
      resize: vertical;
      line-height: 1.45;
    }
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-bottom: 10px;
    }
    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .row input[type="checkbox"] { width: auto; }
    button {
      border: 1px solid #0d5d9a;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
      min-height: 34px;
    }
    button.secondary {
      color: var(--accent);
      background: #f7fbff;
      border-color: #abc9e3;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .content {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      padding: 12px;
    }
    .metric {
      background: #f7fafc;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      padding: 9px;
      min-width: 0;
    }
    .metric .k {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .metric .v {
      font-size: 16px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .plotWrap {
      padding: 12px;
    }
    .plotTools {
      display: grid;
      grid-template-columns: repeat(5, minmax(110px, 1fr));
      gap: 8px;
      align-items: end;
      margin-bottom: 10px;
    }
    .plotTools .row {
      margin-top: 0;
      align-items: center;
      min-height: 34px;
    }
    .plotTools button {
      width: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: 310px;
      background: #fbfdff;
      border: 1px solid var(--line);
      border-radius: 7px;
      cursor: grab;
      touch-action: none;
    }
    canvas.dragging { cursor: grabbing; }
    .tabs {
      display: flex;
      gap: 6px;
      padding: 10px 12px 0;
      border-bottom: 1px solid var(--line-soft);
    }
    .tab {
      border: 1px solid var(--line);
      border-bottom: 0;
      background: #f8fbfd;
      color: #334252;
      border-radius: 6px 6px 0 0;
      padding: 7px 10px;
      cursor: pointer;
    }
    .tab.active {
      background: #fff;
      color: var(--accent);
      font-weight: 700;
    }
    .tabBody {
      padding: 12px;
      min-height: 240px;
      max-height: 430px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid var(--line-soft);
      padding: 7px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      background: #f6f9fc;
      z-index: 1;
    }
    tr.ctrlLocate {
      cursor: pointer;
    }
    tr.ctrlLocate:hover {
      background: #fff7d6;
    }
    tr.ctrlTrendSelected {
      background: #eaf4ff;
    }
    .ctrlTrend {
      margin-bottom: 12px;
      padding: 11px 12px;
      border: 1px solid #bdd7ee;
      border-radius: 7px;
      background: #f7fbff;
    }
    .ctrlTrend h2 {
      margin-bottom: 8px;
      color: var(--accent);
    }
    .ctrlTrendMeta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 9px;
      color: var(--muted);
    }
    .ctrlTrendChipRow {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .ctrlTrendJump {
      cursor: pointer;
    }
    .ctrlTrendChip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
    }
    .ctrlTrendChip.changed {
      border-color: #e1a332;
      background: #fff8df;
      color: #7a5200;
      font-weight: 700;
    }
    tr.ctrlTrendJump:hover {
      background: #fff7d6;
    }
    .bits {
      font-family: Arial, Helvetica, sans-serif;
      word-break: break-all;
      line-height: 1.65;
    }
    .mono {
      font-family: Arial, Helvetica, sans-serif;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--line);
      font-size: 12px;
    }
    .pass { color: var(--good); font-weight: 700; }
    .fail { color: var(--bad); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }
    .empty {
      color: var(--muted);
      padding: 18px;
      text-align: center;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .plotTools { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Waveform Protocol Checker</h1>
      <div class="sub">示波器 CSV 波形判决、bit 恢复、数据解码与规格规则检查</div>
    </div>
    <div class="pill" id="status">等待 CSV</div>
  </header>

  <main>
    <aside class="side">
      <div class="panel">
        <div class="section">
          <h2>CSV 输入</h2>
          <input id="file" type="file" accept=".csv,.txt">
          <div class="grid2" style="margin-top:10px">
            <div>
              <label>最大读取行数</label>
              <input id="maxRows" type="number" min="1000" step="1000" value="1000000">
            </div>
            <div>
              <label>解码最大点数</label>
              <input id="maxSamples" type="number" min="0" step="1000" value="0">
            </div>
          </div>
          <div class="grid2" style="margin-top:10px">
            <div>
              <label>Time 列</label>
              <select id="timeCol"></select>
            </div>
            <div>
              <label>Voltage/Data 列</label>
              <select id="voltCol"></select>
            </div>
          </div>
          <div class="row">
            <button id="reload" class="secondary">重新解析</button>
            <button id="decode">解码</button>
          </div>
        </div>

        <div class="section">
          <h2>判决与时钟</h2>
          <div class="grid2">
            <div>
              <label>阈值模式</label>
              <select id="thresholdMode">
                <option value="auto">Auto mid-level</option>
                <option value="manual">Manual</option>
              </select>
            </div>
            <div>
              <label>阈值 V</label>
              <input id="threshold" type="number" step="0.001" value="0">
            </div>
          </div>
          <div class="grid2">
            <div>
              <label>Data rate 模式</label>
              <select id="rateMode">
                <option value="auto">Auto from edges</option>
                <option value="manual">Manual</option>
              </select>
            </div>
            <div>
              <label>Data rate</label>
              <input id="dataRate" type="number" step="0.001" value="2.6">
            </div>
          </div>
          <button id="autoRate" class="secondary" style="width:100%;margin-bottom:10px">识别速率并填入 Manual</button>
          <div class="grid3">
            <div>
              <label>单位</label>
              <select id="rateUnit">
                <option value="Gbps">Gbps</option>
                <option value="Mbps">Mbps</option>
                <option value="Hz">Hz</option>
              </select>
            </div>
            <div>
              <label>采样相位 UI</label>
              <input id="samplePhase" type="number" min="0" max="1" step="0.01" value="0.50">
            </div>
            <div>
              <label>跳过 bit</label>
              <input id="skipBits" type="number" min="0" step="1" value="0">
            </div>
          </div>
          <div class="row">
            <input id="invert" type="checkbox">
            <label for="invert" style="margin:0">反相判决</label>
          </div>
        </div>

        <div class="section">
          <h2>数据格式</h2>
          <div class="grid2">
            <div>
              <label>Word bits</label>
              <input id="wordBits" type="number" min="1" max="64" step="1" value="8">
            </div>
            <div>
              <label>Bit order</label>
              <input id="bitOrderFixed" type="text" value="LSB first fixed" disabled>
            </div>
          </div>
          <div class="grid2">
            <div>
              <label>显示 words</label>
              <input id="maxWords" type="number" min="16" step="16" value="256">
            </div>
            <div>
              <label>Run-length 限制</label>
              <input id="maxRun" type="number" min="0" step="1" value="0">
            </div>
          </div>
        </div>

        <div class="section">
          <h2>规格检查规则</h2>
          <label>必含 bit pattern，逗号分隔，例如 001111,110000</label>
          <textarea id="patterns" placeholder="可先留空；后面把文档里的 sync / training / command pattern 填进来"></textarea>
          <div class="grid2" style="margin-top:10px">
            <div>
              <label>最小 data rate</label>
              <input id="minRate" type="number" step="0.001" value="0">
            </div>
            <div>
              <label>最大 data rate</label>
              <input id="maxRate" type="number" step="0.001" value="0">
            </div>
          </div>
          <button id="exportReport" class="secondary" style="width:100%;margin-top:8px">导出报告 JSON</button>
        </div>

        <div class="section">
          <h2>CHPI 协议检查</h2>
          <div class="row">
            <input id="chpiEnable" type="checkbox" checked>
            <label for="chpiEnable" style="margin:0">启用 CHPI2.01 文档规则</label>
          </div>
          <div class="grid2" style="margin-top:10px">
            <div>
              <label>Packet bits</label>
              <input id="chpiTokenBits" type="number" min="4" max="32" step="1" value="10">
            </div>
            <div>
              <label>LSP 最小次数</label>
              <input id="chpiMinLsp" type="number" min="0" max="100" step="1" value="5">
            </div>
            <div>
              <label>K-code 容错 mismatch</label>
              <input id="chpiKFuzzy" type="number" min="0" max="4" step="1" value="2">
            </div>
            <div>
              <label>K辅助扫速率 ±%</label>
              <input id="chpiKClockSpan" type="number" min="0" max="10" step="0.1" value="2">
            </div>
            <div>
              <label>K辅助最大 bits</label>
              <input id="chpiKClockBits" type="number" min="1000" max="200000" step="1000" value="12000">
            </div>
          </div>
          <div class="row">
            <input id="chpiKClockAssist" type="checkbox" checked>
            <label for="chpiKClockAssist" style="margin:0">K-code 辅助同步：自动微调 data rate 和采样相位</label>
          </div>
          <div class="row">
            <input id="chpiCheck420" type="checkbox">
            <label for="chpiCheck420" style="margin:0">兼容检查 413/420 编码块（非本 PDF 主规则）</label>
          </div>
          <div class="row">
            <input id="chpiCheckScramble" type="checkbox" checked>
            <label for="chpiCheckScramble" style="margin:0">检查 SCR/LFSR G24 说明项</label>
          </div>
          <label style="margin-top:10px">K-code bit pattern 覆盖（可选）</label>
          <textarea id="chpiKPatterns" placeholder="已内置 K1~K4 type1/type2，按 40'b[39:0] 整个 40bit 反转后的 LSB-first 串行顺序匹配。仅当需要覆盖时填写，例如 K1=40bit 或 K1'=10bit,G1'=10bit"></textarea>
          <label style="margin-top:10px">K-code bit 串自检（可选）</label>
          <textarea id="chpiBitProbe" placeholder="把 Bits 面板里怀疑包含 K2 的 0/1 字符串粘到这里，解码时会直接搜 K1-K4，排除波形采样问题"></textarea>
          <label style="margin-top:10px">8B/10B 编译码表覆盖（可选）</label>
          <textarea id="custom8b10bTable" placeholder="已内置 8b10b.xlsx 的 256 项表。这里留空即可；如需临时覆盖，每行格式：DIN DOUT1 DOUT2，例如 00 0001100010 1110011101"></textarea>
        </div>
      </div>
    </aside>

    <section class="content">
      <div class="panel metrics">
        <div class="metric"><div class="k">Samples</div><div class="v" id="mSamples">-</div></div>
        <div class="metric"><div class="k">Duration</div><div class="v" id="mDuration">-</div></div>
        <div class="metric"><div class="k">Threshold</div><div class="v" id="mThreshold">-</div></div>
        <div class="metric"><div class="k">Estimated UI</div><div class="v" id="mUI">-</div></div>
        <div class="metric"><div class="k">Decoded Bits</div><div class="v" id="mBits">-</div></div>
        <div class="metric"><div class="k">Check</div><div class="v" id="mCheck">-</div></div>
      </div>

      <div class="panel plotWrap">
        <div class="plotTools">
          <div>
            <label>X scale</label>
            <select id="plotXMode">
              <option value="all">All waveform</option>
              <option value="decoded">Decoded range</option>
              <option value="window">Bit window</option>
            </select>
          </div>
          <div>
            <label>Start bit</label>
            <input id="plotStartBit" type="number" min="0" step="1" value="0">
          </div>
          <div>
            <label>Show bits</label>
            <input id="plotBitCount" type="number" min="10" step="10" value="400">
          </div>
          <div class="row">
            <input id="plotAutoY" type="checkbox" checked>
            <label for="plotAutoY" style="margin:0">自动 Y scale</label>
          </div>
          <div class="row">
            <input id="plotAnnotations" type="checkbox" checked>
            <label for="plotAnnotations" style="margin:0">标注 CHPI</label>
          </div>
          <button id="plotFit" class="secondary">Auto fit</button>
        </div>
        <canvas id="plot" width="1200" height="360"></canvas>
      </div>

      <div class="panel">
        <div class="tabs">
          <button class="tab active" data-tab="checks">检查结果</button>
          <button class="tab" data-tab="ctrl">CTRL 解码</button>
          <button class="tab" data-tab="words">Words</button>
          <button class="tab" data-tab="bits">Bits</button>
          <button class="tab" data-tab="edges">Edges</button>
        </div>
        <div id="tabBody" class="tabBody">
          <div class="empty">导入 CSV 后点击“解码”。</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      rawText: '',
      headers: [],
      rows: [],
      samples: [],
      numericCache: new Map(),
      result: null,
      plotRangeOverride: null,
      plotDrag: null,
      columnChangeTimer: null,
      buildSeq: 0,
      worker: null,
      columnsDirty: false,
      selectedBit: null,
      selectedCtrlTrend: null,
      custom8b10bCache: { text: null, map: null },
      activeTab: 'checks'
    };

    const $ = (id) => document.getElementById(id);

    function setStatus(text, cls = '') {
      const s = $('status');
      s.textContent = text;
      s.className = 'pill ' + cls;
    }

    function splitCsvLine(line) {
      const out = [];
      let cur = '', q = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (q && line[i + 1] === '"') { cur += '"'; i++; }
          else q = !q;
        } else if (c === ',' && !q) {
          out.push(cur.trim());
          cur = '';
        } else {
          cur += c;
        }
      }
      out.push(cur.trim());
      return out;
    }

    function parseNumber(v) {
      if (v == null) return NaN;
      let s = String(v).trim();
      if (!s) return NaN;
      s = s.replace(/[，,]/g, '');
      const mult = s.match(/^([-+]?\d*\.?\d+(?:[eE][-+]?\d+)?)\s*([pnumkMGT]?)(s|V|v)?$/);
      if (!mult) return Number(s);
      const n = Number(mult[1]);
      const u = mult[2];
      const scale = { p:1e-12, n:1e-9, u:1e-6, m:1e-3, k:1e3, M:1e6, G:1e9, T:1e12 }[u] ?? 1;
      return n * scale;
    }

    function createCsvWorker() {
      const workerCode = `
        function splitCsvLine(line) {
          const out = [];
          let cur = '', q = false;
          for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') {
              if (q && line[i + 1] === '"') { cur += '"'; i++; }
              else q = !q;
            } else if (c === ',' && !q) {
              out.push(cur.trim());
              cur = '';
            } else {
              cur += c;
            }
          }
          out.push(cur.trim());
          return out;
        }
        function parseNumber(v) {
          if (v == null) return NaN;
          let s = String(v).trim();
          if (!s) return NaN;
          s = s.replace(/[，,]/g, '');
          const mult = s.match(/^([-+]?\\d*\\.?\\d+(?:[eE][-+]?\\d+)?)\\s*([pnumkMGT]?)(s|V|v)?$/);
          if (!mult) return Number(s);
          const n = Number(mult[1]);
          const u = mult[2];
          const scale = { p:1e-12, n:1e-9, u:1e-6, m:1e-3, k:1e3, M:1e6, G:1e9, T:1e12 }[u] ?? 1;
          return n * scale;
        }
        function guessColumn(headers, previewRows, kind) {
          const names = headers.map(h => String(h).toLowerCase());
          const timeHints = ['time', 'second', 'sec', '时间', 't'];
          const voltHints = ['volt', 'ch', 'channel', 'ampl', 'data', '电压', 'v'];
          const hints = kind === 'time' ? timeHints : voltHints;
          for (let i = 0; i < names.length; i++) {
            if (hints.some(h => names[i].includes(h))) return i;
          }
          if (kind === 'time') return 0;
          let best = Math.min(1, Math.max(0, headers.length - 1)), bestSpan = -Infinity;
          for (let c = 0; c < headers.length; c++) {
            let min = Infinity, max = -Infinity, count = 0;
            for (const r of previewRows) {
              const v = parseNumber(r[c]);
              if (!Number.isFinite(v)) continue;
              if (v < min) min = v;
              if (v > max) max = v;
              count++;
            }
            if (count >= 10 && c !== 0 && max - min > bestSpan) {
              bestSpan = max - min;
              best = c;
            }
          }
          return best;
        }
        function parseCsvSamples(text, timeCol, dataCol, maxRows, maxSamples, taskId) {
          const rawLines = text.split(/\\r?\\n/);
          let headerIdx = 0;
          while (headerIdx < rawLines.length && splitCsvLine(rawLines[headerIdx]).length < 2) headerIdx++;
          const first = splitCsvLine(rawLines[headerIdx] || '');
          const numericCount = first.filter(x => Number.isFinite(parseNumber(x))).length;
          const hasHeader = numericCount < first.length / 2;
          const headers = hasHeader ? first : first.map((_, i) => 'col' + i);
          const dataStart = hasHeader ? headerIdx + 1 : headerIdx;
          const available = Math.max(0, rawLines.length - dataStart);
          const rowLimit = Math.min(available, maxRows);
          const decimStep = maxSamples > 0 ? Math.max(1, Math.ceil(rowLimit / maxSamples)) : 1;
          const previewRows = [];
          let guessedTime = timeCol;
          let guessedData = dataCol;
          for (let i = 0; i < Math.min(rowLimit, 2000); i++) {
            const line = rawLines[dataStart + i];
            if (line && line.trim()) previewRows.push(splitCsvLine(line));
          }
          if (guessedTime == null || guessedData == null) {
            guessedTime = guessColumn(headers, previewRows, 'time');
            guessedData = guessColumn(headers, previewRows, 'volt');
            postMessage({ taskId, type: 'headers', headers, guessedTime, guessedData, rowLimit, decimStep });
          }
          const samples = [];
          let lastT = -Infinity, sorted = true;
          for (let i = 0; i < rowLimit; i += decimStep) {
            const line = rawLines[dataStart + i];
            if (!line || !line.trim()) continue;
            const r = splitCsvLine(line);
            const t = parseNumber(r[guessedTime]);
            const v = parseNumber(r[guessedData]);
            if (Number.isFinite(t) && Number.isFinite(v)) {
              if (t < lastT) sorted = false;
              lastT = t;
              samples.push({ t, v });
            }
            if (i > 0 && i % 20000 === 0) {
              postMessage({ taskId, type: 'progress', pct: Math.round(i / rowLimit * 100) });
            }
          }
          if (!sorted) samples.sort((a, b) => a.t - b.t);
          return { headers, guessedTime, guessedData, rowLimit, decimStep, samples };
        }
        onmessage = (e) => {
          const { taskId, text, timeCol, dataCol, maxRows, maxSamples } = e.data;
          try {
            const result = parseCsvSamples(text, timeCol, dataCol, maxRows, maxSamples, taskId);
            postMessage({ taskId, type: 'done', ...result });
          } catch (err) {
            postMessage({ taskId, type: 'error', message: err.message || String(err) });
          }
        };
      `;
      const blob = new Blob([workerCode], { type: 'application/javascript' });
      return new Worker(URL.createObjectURL(blob));
    }

    function parseCsvInWorker({ text, timeCol = null, dataCol = null, maxRows, maxSamples, statusPrefix }) {
      if (state.worker) state.worker.terminate();
      state.worker = createCsvWorker();
      const taskId = ++state.buildSeq;
      return new Promise((resolve, reject) => {
        state.worker.onmessage = (e) => {
          const msg = e.data;
          if (msg.taskId !== taskId) return;
          if (msg.type === 'headers') {
            state.headers = msg.headers;
            fillColumnSelects(msg.guessedTime, msg.guessedData);
            setStatus(`${statusPrefix} 识别列完成，${msg.decimStep > 1 ? '抽样步长 ' + msg.decimStep : '未抽样'}`);
          } else if (msg.type === 'progress') {
            setStatus(`${statusPrefix} ${msg.pct}%...`);
          } else if (msg.type === 'done') {
            state.worker.terminate();
            state.worker = null;
            resolve(msg);
          } else if (msg.type === 'error') {
            state.worker.terminate();
            state.worker = null;
            reject(new Error(msg.message));
          }
        };
        state.worker.onerror = (err) => {
          if (state.worker) state.worker.terminate();
          state.worker = null;
          reject(new Error(err.message || 'Worker error'));
        };
        state.worker.postMessage({ taskId, text, timeCol, dataCol, maxRows, maxSamples });
      });
    }

    function parseCsv(text) {
      const lines = text.split(/\r?\n/).filter(l => l.trim().length);
      if (!lines.length) throw new Error('CSV 是空的');
      let headerIdx = 0;
      while (headerIdx < lines.length && splitCsvLine(lines[headerIdx]).length < 2) headerIdx++;
      const first = splitCsvLine(lines[headerIdx]);
      const numericCount = first.filter(x => Number.isFinite(parseNumber(x))).length;
      const hasHeader = numericCount < first.length / 2;
      const headers = hasHeader ? first : first.map((_, i) => `col${i}`);
      const dataStart = hasHeader ? headerIdx + 1 : headerIdx;
      const rows = [];
      for (let i = dataStart; i < lines.length; i++) {
        const cols = splitCsvLine(lines[i]);
        if (cols.length < 2) continue;
        rows.push(cols);
      }
      return { headers, rows };
    }

    async function readCsvPreview(file, maxRows) {
      if (file.stream && window.TextDecoder) {
        const reader = file.stream().getReader();
        const decoder = new TextDecoder('utf-8');
        let pending = '';
        let lines = [];
        while (lines.length < maxRows + 5) {
          const { value, done } = await reader.read();
          if (done) break;
          pending += decoder.decode(value, { stream: true });
          const parts = pending.split(/\r?\n/);
          pending = parts.pop() ?? '';
          for (const line of parts) {
            if (line.trim()) lines.push(line);
            if (lines.length >= maxRows + 5) break;
          }
        }
        if (pending.trim() && lines.length < maxRows + 5) lines.push(pending);
        try { await reader.cancel(); } catch (_) {}
        return lines.join('\n');
      }

      const sliceBytes = Math.min(file.size, 64 * 1024 * 1024);
      return await file.slice(0, sliceBytes).text();
    }

    function decimateRows(rows, maxRows) {
      if (rows.length <= maxRows) return { rows, decimated: false, step: 1 };
      const step = Math.ceil(rows.length / maxRows);
      const out = [];
      for (let i = 0; i < rows.length; i += step) out.push(rows[i]);
      return { rows: out, decimated: true, step };
    }

    function guessColumn(headers, rows, kind) {
      const names = headers.map(h => h.toLowerCase());
      const timeHints = ['time', 'second', 'sec', '时间', 't'];
      const voltHints = ['volt', 'ch', 'channel', 'ampl', 'data', '电压', 'v'];
      const hints = kind === 'time' ? timeHints : voltHints;
      for (let i = 0; i < names.length; i++) {
        if (hints.some(h => names[i].includes(h))) return i;
      }
      if (kind === 'time') return 0;
      let best = 1, bestSpan = -Infinity;
      for (let c = 0; c < headers.length; c++) {
        const vals = rows.slice(0, 2000).map(r => parseNumber(r[c])).filter(Number.isFinite);
        if (vals.length < 10) continue;
        const mm = minMax(vals);
        const span = mm.max - mm.min;
        if (span > bestSpan && c !== 0) { bestSpan = span; best = c; }
      }
      return best;
    }

    function minMax(values) {
      let min = Infinity, max = -Infinity;
      for (const v of values) {
        if (!Number.isFinite(v)) continue;
        if (v < min) min = v;
        if (v > max) max = v;
      }
      return { min, max };
    }

    async function numericColumnAsync(col, seq, onProgress = null) {
      if (state.numericCache.has(col)) return state.numericCache.get(col);
      const rows = state.rows;
      const arr = new Float64Array(rows.length);
      const chunk = 2000;
      for (let i = 0; i < rows.length; i++) {
        if (seq !== state.buildSeq) return null;
        arr[i] = parseNumber(rows[i][col]);
        if (i > 0 && i % chunk === 0) {
          if (onProgress) onProgress(i, rows.length);
          await nextFrame();
        }
      }
      if (seq !== state.buildSeq) return null;
      state.numericCache.set(col, arr);
      return arr;
    }

    function fillColumnSelects(timeValue = null, voltValue = null) {
      const time = $('timeCol'), volt = $('voltCol');
      time.innerHTML = '';
      volt.innerHTML = '';
      state.headers.forEach((h, i) => {
        const a = new Option(`${i}: ${h}`, i);
        const b = new Option(`${i}: ${h}`, i);
        time.add(a);
        volt.add(b);
      });
      time.value = timeValue ?? 0;
      volt.value = voltValue ?? Math.min(1, Math.max(0, state.headers.length - 1));
    }

    function buildSamples() {
      const ti = Number($('timeCol').value);
      const vi = Number($('voltCol').value);
      const samples = [];
      for (const r of state.rows) {
        const t = parseNumber(r[ti]);
        const v = parseNumber(r[vi]);
        if (Number.isFinite(t) && Number.isFinite(v)) samples.push({ t, v });
      }
      let sorted = true;
      for (let i = 1; i < samples.length; i++) {
        if (samples[i].t < samples[i - 1].t) { sorted = false; break; }
      }
      if (!sorted) samples.sort((a, b) => a.t - b.t);
      state.samples = samples;
      return samples;
    }

    function nextFrame() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }

    async function buildSamplesAsync(seq, onProgress = null) {
      const ti = Number($('timeCol').value);
      const vi = Number($('voltCol').value);
      const tCol = await numericColumnAsync(ti, seq, (done, total) => {
        if (onProgress) onProgress(done, total, 'time');
      });
      if (!tCol) return null;
      const vCol = await numericColumnAsync(vi, seq, (done, total) => {
        if (onProgress) onProgress(done, total, 'data');
      });
      if (!vCol) return null;
      const samples = [];
      const rows = state.rows;
      const chunk = 4000;
      let lastT = -Infinity;
      let sorted = true;
      for (let i = 0; i < rows.length; i++) {
        if (seq !== state.buildSeq) return null;
        const t = tCol[i];
        const v = vCol[i];
        if (Number.isFinite(t) && Number.isFinite(v)) {
          if (t < lastT) sorted = false;
          lastT = t;
          samples.push({ t, v });
        }
        if (i > 0 && i % chunk === 0) {
          if (onProgress) onProgress(i, rows.length);
          await nextFrame();
        }
      }
      if (seq !== state.buildSeq) return null;
      if (!sorted) {
        setStatus(`时间列乱序，排序 ${samples.length.toLocaleString()} samples...`);
        await nextFrame();
        samples.sort((a, b) => a.t - b.t);
      }
      if (seq !== state.buildSeq) return null;
      state.samples = samples;
      return samples;
    }

    function rebuildSamplesPreview() {
      if (!state.rows.length) return;
      setStatus('列已切换，重建预览中...');
      drawPlot();
      clearTimeout(state.columnChangeTimer);
      const seq = ++state.buildSeq;
      state.columnChangeTimer = setTimeout(async () => {
        try {
          const samples = await buildSamplesAsync(seq, (done, total, stage = 'samples') => {
            setStatus(`解析 ${stage} ${Math.round(done / total * 100)}%...`);
          });
          if (!samples) return;
          state.result = null;
          state.plotRangeOverride = null;
          drawPlot();
          renderTab();
          $('mSamples').textContent = state.samples.length.toLocaleString();
          $('mDuration').textContent = state.samples.length > 1 ? fmtTime(state.samples.at(-1).t - state.samples[0].t) : '-';
          $('mThreshold').textContent = '-';
          $('mUI').textContent = '-';
          $('mBits').textContent = '-';
          $('mCheck').textContent = '-';
          setStatus(`预览已更新 ${state.samples.length.toLocaleString()} samples`, 'pass');
        } catch (err) {
          setStatus('列切换失败', 'fail');
          alert(err.message);
        }
      }, 80);
    }

    function markColumnsChanged() {
      clearTimeout(state.columnChangeTimer);
      state.buildSeq++;
      if (state.worker) {
        state.worker.terminate();
        state.worker = null;
      }
      state.plotRangeOverride = null;
      state.columnsDirty = true;
      drawPlot();
      setStatus('列已切换，点击“重新解析”或“解码”应用', 'warn');
    }

    function applyWorkerResult(result) {
      state.headers = result.headers;
      state.rows = [];
      state.numericCache = new Map();
      state.samples = result.samples || [];
      fillColumnSelects(result.guessedTime, result.guessedData);
      state.result = null;
      state.plotRangeOverride = null;
      state.columnsDirty = false;
      drawPlot();
      renderTab();
      $('mSamples').textContent = state.samples.length.toLocaleString();
      $('mDuration').textContent = state.samples.length > 1 ? fmtTime(state.samples.at(-1).t - state.samples[0].t) : '-';
      $('mThreshold').textContent = '-';
      $('mUI').textContent = '-';
      $('mBits').textContent = '-';
      $('mCheck').textContent = '-';
    }

    function percentile(values, p) {
      if (!values.length) return NaN;
      const a = values.slice().sort((x, y) => x - y);
      const idx = Math.min(a.length - 1, Math.max(0, Math.floor((a.length - 1) * p)));
      return a[idx];
    }

    function getThreshold(samples) {
      if ($('thresholdMode').value === 'manual') return Number($('threshold').value);
      const vals = samples.map(s => s.v);
      const lo = percentile(vals, 0.05);
      const hi = percentile(vals, 0.95);
      const th = (lo + hi) / 2;
      $('threshold').value = nice(th, 6);
      return th;
    }

    function binaryAt(v, th) {
      let b = v >= th ? 1 : 0;
      if ($('invert').checked) b ^= 1;
      return b;
    }

    function findEdges(samples, th) {
      const edges = [];
      if (samples.length < 2) return edges;
      let prev = binaryAt(samples[0].v, th);
      for (let i = 1; i < samples.length; i++) {
        const cur = binaryAt(samples[i].v, th);
        if (cur !== prev) {
          const a = samples[i - 1], b = samples[i];
          const dv = b.v - a.v;
          let frac = Math.abs(dv) > 1e-30 ? (th - a.v) / dv : 0.5;
          frac = Math.max(0, Math.min(1, frac));
          edges.push({ t: a.t + frac * (b.t - a.t), from: prev, to: cur });
          prev = cur;
        }
      }
      return edges;
    }

    function median(arr) {
      if (!arr.length) return NaN;
      const a = arr.slice().sort((x, y) => x - y);
      const m = Math.floor(a.length / 2);
      return a.length % 2 ? a[m] : (a[m - 1] + a[m]) / 2;
    }

    function estimateUi(edges) {
      if (edges.length < 2) return NaN;
      const d = [];
      for (let i = 1; i < edges.length; i++) {
        const x = edges[i].t - edges[i - 1].t;
        if (x > 0) d.push(x);
      }
      if (!d.length) return NaN;
      return percentile(d, 0.2);
    }

    function estimateUiRobust(edges) {
      if (edges.length < 3) return { ui: NaN, confidence: 0, detail: 'edge 数不足' };
      const intervals = [];
      for (let i = 1; i < edges.length; i++) {
        const dt = edges[i].t - edges[i - 1].t;
        if (dt > 0) intervals.push(dt);
      }
      if (intervals.length < 2) return { ui: NaN, confidence: 0, detail: 'edge interval 不足' };
      intervals.sort((a, b) => a - b);
      const lo = percentile(intervals, 0.02);
      const hi = percentile(intervals, 0.35);
      const seeds = [];
      for (const x of intervals) {
        if (x >= lo && x <= hi) seeds.push(x);
        if (seeds.length >= 80) break;
      }
      if (!seeds.length) seeds.push(percentile(intervals, 0.1));

      let best = { ui: NaN, score: Infinity, confidence: 0 };
      for (const seed of seeds) {
        for (let scale = 0.75; scale <= 1.25; scale += 0.01) {
          const ui = seed * scale;
          if (!(ui > 0)) continue;
          let err = 0, used = 0;
          for (const dt of intervals) {
            const n = Math.max(1, Math.round(dt / ui));
            if (n > 64) continue;
            const rel = Math.abs(dt / (n * ui) - 1);
            err += Math.min(rel, 0.5);
            used++;
          }
          if (!used) continue;
          const score = err / used;
          if (score < best.score) {
            best = { ui, score, confidence: Math.max(0, Math.min(1, 1 - score * 20)) };
          }
        }
      }
      const rate = Number.isFinite(best.ui) && best.ui > 0 ? 1 / best.ui : NaN;
      return {
        ui: best.ui,
        confidence: best.confidence,
        detail: Number.isFinite(rate) ? `${fmtRate(rate)}, UI ${fmtTime(best.ui)}, score ${nice(best.score, 3)}, confidence ${nice(best.confidence * 100, 3)}%` : '无法估计'
      };
    }

    function writeManualRateFromUi(ui) {
      if (!Number.isFinite(ui) || ui <= 0) return;
      const hz = 1 / ui;
      if (hz >= 1e9) {
        $('rateUnit').value = 'Gbps';
        $('dataRate').value = nice(hz / 1e9, 7);
      } else if (hz >= 1e6) {
        $('rateUnit').value = 'Mbps';
        $('dataRate').value = nice(hz / 1e6, 7);
      } else {
        $('rateUnit').value = 'Hz';
        $('dataRate').value = nice(hz, 7);
      }
      $('rateMode').value = 'manual';
      $('dataRate').disabled = false;
    }

    function manualUi() {
      const rate = Number($('dataRate').value);
      const unit = $('rateUnit').value;
      if (!rate || rate <= 0) return NaN;
      const hz = unit === 'Gbps' ? rate * 1e9 : unit === 'Mbps' ? rate * 1e6 : rate;
      return 1 / hz;
    }

    function sampleValue(samples, t) {
      if (!samples.length) return NaN;
      let lo = 0, hi = samples.length - 1;
      if (t <= samples[0].t) return samples[0].v;
      if (t >= samples[hi].t) return samples[hi].v;
      while (hi - lo > 1) {
        const m = (lo + hi) >> 1;
        if (samples[m].t <= t) lo = m; else hi = m;
      }
      const a = samples[lo], b = samples[hi];
      const f = (t - a.t) / (b.t - a.t);
      return a.v + f * (b.v - a.v);
    }

    function decodeBits(samples, th, ui, edges, opts = {}) {
      const phase = Number.isFinite(opts.phase) ? opts.phase : Number($('samplePhase').value);
      const skip = Math.max(0, Number($('skipBits').value) || 0);
      const startBase = Number.isFinite(opts.startBase) ? opts.startBase : (edges.length ? edges[0].t : samples[0].t);
      const start = startBase + phase * ui;
      const end = samples[samples.length - 1].t;
      const maxBits = Math.max(0, Number(opts.maxBits) || 0);
      const bits = [];
      const times = [];
      for (let n = skip; ; n++) {
        const t = start + n * ui;
        if (t > end) break;
        bits.push(binaryAt(sampleValue(samples, t), th));
        times.push(t);
        if (maxBits && bits.length >= maxBits) break;
      }
      return { bits, times, start };
    }

    function wordsFromBits(bits) {
      const n = Math.max(1, Number($('wordBits').value) || 8);
      const maxWords = Math.max(16, Number($('maxWords').value) || 256);
      const words = [];
      for (let i = 0; i + n <= bits.length && words.length < maxWords; i += n) {
        const chunk = bits.slice(i, i + n);
        let val = 0;
        for (let k = 0; k < chunk.length; k++) val |= chunk[k] << k;
        words.push({ index: words.length, bitStart: i, bits: chunk.join(''), value: val, hex: '0x' + val.toString(16).toUpperCase().padStart(Math.ceil(n / 4), '0') });
      }
      return words;
    }

    function build8b10bDecodeMap() {
      const map = new Map();
      function add(code, byte) {
        if (!map.has(code)) map.set(code, []);
        if (!map.get(code).includes(byte)) map.get(code).push(byte);
      }
      for (let byte = 0; byte < 256; byte++) {
        const x = byte & 31;
        const y = (byte >> 5) & 7;
        for (const six of EIGHTB_TENB_5B6B[x]) {
          for (const four of EIGHTB_TENB_3B4B[y]) {
            add(six + four, byte);
          }
        }
      }
      // Alternate D.x.7 forms commonly used for running-disparity control.
      const alt7 = {
        17: ['1000110111', '1000111000'],
        18: ['0100110111', '0100111000'],
        20: ['0010110111', '0010111000']
      };
      for (const [xText, codes] of Object.entries(alt7)) {
        const byte = (7 << 5) | Number(xText);
        for (const code of codes) add(code, byte);
      }
      return map;
    }
